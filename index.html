<!--
  PWA BOOTSTRAP — runs before React loads.
  Generates the app icon via Canvas (no static PNG needed in the repo),
  injects a web app manifest as a data: URI (no manifest.json file needed),
  and registers sw.js as the service worker.
  All three steps are self-contained here so the repo stays as two files:
  index.html + sw.js.
-->
<script>
(function(){
  function makeIcon(size) {
    try {
      var c = document.createElement('canvas');
      c.width = c.height = size;
      var ctx = c.getContext('2d');
      var r = size * 0.22;
      ctx.fillStyle = '#060d1a';
      ctx.beginPath();
      ctx.moveTo(r,0); ctx.lineTo(size-r,0); ctx.arcTo(size,0,size,r,r);
      ctx.lineTo(size,size-r); ctx.arcTo(size,size,size-r,size,r);
      ctx.lineTo(r,size); ctx.arcTo(0,size,0,size-r,r);
      ctx.lineTo(0,r); ctx.arcTo(0,0,r,0,r);
      ctx.closePath(); ctx.fill();
      var p = size*0.06, ir = size*0.14;
      ctx.fillStyle = '#091820';
      ctx.beginPath();
      ctx.moveTo(p+ir,p); ctx.lineTo(size-p-ir,p); ctx.arcTo(size-p,p,size-p,p+ir,ir);
      ctx.lineTo(size-p,size-p-ir); ctx.arcTo(size-p,size-p,size-p-ir,size-p,ir);
      ctx.lineTo(p+ir,size-p); ctx.arcTo(p,size-p,p,size-p-ir,ir);
      ctx.lineTo(p,p+ir); ctx.arcTo(p,p,p+ir,p,ir);
      ctx.closePath(); ctx.fill();
      var g = ctx.createLinearGradient(0,0,size,size);
      g.addColorStop(0,'#38bdf8'); g.addColorStop(1,'#14b8a6');
      ctx.fillStyle = g;
      ctx.font = '900 '+Math.round(size*0.5)+'px Arial,Helvetica,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText('D', size*0.44, size*0.68);
      ctx.fillStyle = '#6a6a7a';
      ctx.font = '700 '+Math.round(size*0.13)+'px Arial,Helvetica,sans-serif';
      ctx.fillText('OS', size*0.62, size*0.86);
      return c.toDataURL('image/png');
    } catch(e) { return ''; }
  }
  var icon192 = makeIcon(192), icon512 = makeIcon(512);
  if (icon192) { var al=document.createElement('link'); al.rel='apple-touch-icon'; al.href=icon192; document.head.appendChild(al); }
  var manifest = { name:'DailyOS', short_name:'DailyOS', description:'Fitness, nutrition & vocab', start_url:'./', scope:'./', display:'standalone', orientation:'portrait', background_color:'#060d1a', theme_color:'#091820', icons:[{src:icon192,sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:icon512,sizes:'512x512',type:'image/png',purpose:'any maskable'}] };
  var ml=document.createElement('link'); ml.rel='manifest'; ml.href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(manifest)); document.head.appendChild(ml);
  if ('serviceWorker' in navigator) { window.addEventListener('load', function(){ navigator.serviceWorker.register('./sw.js').catch(function(){}); }); }
})();
</script>

<!--
  MAIN APPLICATION SCRIPT
  type="text/babel" tells Babel standalone (loaded above) to transpile this
  block before execution. All React components, state, utilities, and API
  calls live in this single script. There is no bundler, no imports, no exports.

  Execution order matters: constants → utilities → rate limiter → API wrappers
  → components (leaf to root) → ReactDOM.createRoot at the very bottom.

  All persistent state is stored in localStorage via ld()/sv() helpers.
  The App component owns all state and passes it down as props — there is no
  global state library (no Redux, no Context).
-->
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── COUNT-UP HOOK ─────────────────────────────────────────────────────────────
// Animates a number from 0 to `target` using rAF. Re-fires when target changes.
// Used by stat cards on Home and Fitness pages.
function useCountUp(target, duration = 850) {
  const [val, setVal] = useState(0);
  const raf = useRef(null);
  useEffect(() => {
    cancelAnimationFrame(raf.current);
    if (!target) { setVal(0); return; }
    let start = null;
    const step = ts => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / duration, 1);
      // ease-out cubic
      const ease = 1 - Math.pow(1 - p, 3);
      setVal(Math.floor(ease * target));
      if (p < 1) raf.current = requestAnimationFrame(step);
    };
    raf.current = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf.current);
  }, [target]);
  return val;
}

function habitStreak(habitId, habitChecked) {
  let s = 0;
  const t = new Date(); t.setHours(0,0,0,0);
  for (let i = 0; i <= 365; i++) {
    const d = new Date(t); d.setDate(d.getDate() - i);
    if (habitChecked[dk(d)]?.[habitId]) s++;
    else if (i > 0) break;
  }
  return s;
}

// getDayInfo — central scheduling function used by FitnessPage, HomePage,
// GymHeatmap, and WeeklyHistory. DO NOT change GYM_ANCHOR or GYM_SPLITS
// without understanding: diff % 2 alternates gym/non-gym days; splitIdx
// selects which of the two GYM_SPLITS to show on gym days.
// Kickboxing = Mon–Thu (dow 1–4), regardless of gym schedule.
function getDayInfo(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const dow = d.getDay();
  const diff = Math.round((d - GYM_ANCHOR) / 86400000);
  const isGym = ((diff % 2) + 2) % 2 === 0;
  const splitIdx = Math.floor(Math.abs(diff) / 2) % 2;
  const isKick = dow >= 1 && dow <= 4;
  const type = (isKick && isGym) ? "combo" : isKick ? "kb" : isGym ? "gym" : "rest";
  return { type, isKick, isGym, gymSplit: isGym ? GYM_SPLITS[splitIdx] : null };
}

// ── STORAGE ───────────────────────────────────────────────────────────────────
// ld() / sv() are the only localStorage access points in the entire app.
// All state keys follow the pattern "dos_<name>_v<N>" — bump N when the
// shape of the stored data changes to avoid reading stale/incompatible data.
// dk() produces "YYYY-MM-DD" keys used as object keys inside meals/attend/usage.
function dk(d) { const x = new Date(d); x.setHours(0,0,0,0); const p = n => String(n).padStart(2,"0"); return `${x.getFullYear()}-${p(x.getMonth()+1)}-${p(x.getDate())}`; }
const tdk = () => dk(new Date());
const vd = (o) => { const d = new Date(); d.setDate(d.getDate()+o); d.setHours(0,0,0,0); return d; };
const ld = (k, f) => { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : f; } catch { return f; } };
const sv = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };
const getQuote = () => { const d = new Date(); return QUOTES[(d.getFullYear()*366+d.getMonth()*31+d.getDate())%QUOTES.length]; };

function getTodayWords() {
  const d = new Date();
  const seed = d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
  const rand = s => { const x = Math.sin(s)*10000; return x - Math.floor(x); };
  const seen = new Set(), out = []; let i = 0;
  while (out.length < 3) {
    const idx = Math.floor(rand(seed+i) * WORDS.length);
    if (!seen.has(idx)) { seen.add(idx); out.push({...WORDS[idx], learned:false, videoUrl:null}); }
    i++;
  }
  return out;
}

// ── SPEECH ────────────────────────────────────────────────────────────────────
// _voice is resolved once and cached. onvoiceschanged re-resolves it when the
// browser finishes loading premium device voices (happens after page load on
// Chrome/Safari). Using localService voices avoids the robotic browser fallback.
let _voice = null;
const _PREF_NAMES = ["Samantha","Karen","Serena","Ava","Allison","Moira","Tessa","Fiona",
                     "Google UK English Female","Google US English","Alice","Daniel","Google UK English Male"];
// Called eagerly + on voiceschanged for non-iOS browsers.
function _resolveVoice() {
  const vs = window.speechSynthesis?.getVoices() || [];
  if (!vs.length) return;
  for (const n of _PREF_NAMES) {
    const v = vs.find(x => x.name.includes(n) && x.lang.startsWith("en"));
    if (v) { _voice = v; return; }
  }
  _voice = vs.find(x => x.localService && x.lang.startsWith("en"))
        || vs.find(x => x.lang.startsWith("en-US"))
        || vs.find(x => x.lang.startsWith("en"))
        || vs[0] || null;
}
// iOS Safari only exposes voices during a user-gesture call; call every time.
function _pickVoice() {
  const vs = window.speechSynthesis?.getVoices() || [];
  if (vs.length) {
    for (const n of _PREF_NAMES) {
      const v = vs.find(x => x.name.includes(n) && x.lang.startsWith("en"));
      if (v) { _voice = v; return v; }
    }
    const best = vs.find(x => x.localService && x.lang.startsWith("en"))
              || vs.find(x => x.lang.startsWith("en-US"))
              || vs.find(x => x.lang.startsWith("en"))
              || vs[0] || null;
    _voice = best; return best;
  }
  return _voice;
}
if (window.speechSynthesis) {
  _resolveVoice();
  window.speechSynthesis.onvoiceschanged = _resolveVoice;
}
function makeUtterance(text, rate, pitch) {
  const u = new SpeechSynthesisUtterance(text);
  u.rate = rate || 0.82; u.pitch = pitch || 1.05;
  // _pickVoice() calls getVoices() fresh — required on iOS to get device voices
  const v = _pickVoice();
  if (v) u.voice = v;
  return u;
}
const speak = (t, r) => {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  // Tiny defer required on iOS Safari after cancel() to avoid silent failure
  setTimeout(() => window.speechSynthesis.speak(makeUtterance(t, r || 0.82)), 60);
};

const TTS_KEY = "dos_tts_v1";
function loadTTSPrefs() {

}

// Google TTS locale options — each sounds distinct, all natural quality
const GT_VOICES = [

  {id:"en-GB", label:"British English (Female)"},
  {id:"en-AU", label:"Australian English (Female)"},
  {id:"en-IN", label:"Indian English (Female)"},
];

let _gtAudio = null;
function speakGoogle(text, locale) {
  const tl = locale || "en-US";
  const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=${tl}&client=tw-ob`;
  try {
    if (_gtAudio) { _gtAudio.pause(); _gtAudio = null; }
    _gtAudio = new Audio(url);
    const p = _gtAudio.play();
    if (p && p.catch) p.catch(()=> speak(text, 0.82));
    return _gtAudio;
  } catch {
    speak(text, 0.82);
    return null;
  }
}

// Kept at module scope — prevents V8 GC from destroying the utterance mid-speech,
// which silently kills onend + voice assignment in Chrome.
let _currentUtt = null;
const _isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);

function speakText(text, rate) {
  const prefs = loadTTSPrefs();
  if (prefs.provider === "google") {
    speakGoogle(text, prefs.gtLocale || "en-US");
  } else {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    setTimeout(() => {
      const u = makeUtterance(text, rate || 0.82);
      // iOS returns empty getVoices() — skip voice selection entirely
      if (!_isIOS && prefs.browserVoice) {
        const vs = window.speechSynthesis.getVoices();
        const v = vs.find(x => x.name === prefs.browserVoice);
        if (v) {
          u.voice = v;
          u.lang = v.lang.replace('_', '-'); // Android Chrome requires lang alongside voice
        }
      }
      _currentUtt = u; // hold strong ref — prevents GC mid-utterance
      window.speechSynthesis.speak(u);
    }, 60);
  }
}

async function playSyllablesText(syls) {
  const prefs = loadTTSPrefs();
  if (prefs.provider === "google") {
    for (let i = 0; i < syls.length; i++) {
      await new Promise(resolve => {
        const audio = speakGoogle(syls[i], prefs.gtLocale || "en-US");
        if (audio) { audio.onended = resolve; setTimeout(resolve, 2000); }
        else { setTimeout(resolve, 600); }
      });
      if (i < syls.length - 1) await new Promise(r => setTimeout(r, 350));
    }
  } else {
    playSyllables(syls);
  }
}

function playSyllables(syls) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  let i = 0;
  const next = () => {
    if (i >= syls.length) return;
    const u = makeUtterance(syls[i], 0.58, 1.08);
    let done = false;
    const advance = () => {
      if (done) return; done = true;
      clearTimeout(t);
      i++;
      setTimeout(next, 300);
    };
    u.addEventListener('end', advance);
    u.addEventListener('error', advance);
    const t = setTimeout(advance, 3000);
    window.speechSynthesis.speak(u);
  };
  setTimeout(next, 80);
}

// ── ROBUST JSON EXTRACTOR ─────────────────────────────────────────────────────
function extractJSON(raw) {
  if (!raw) throw new Error("Empty response");
  try { return JSON.parse(raw); } catch {}
  const stripped = raw.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  try { return JSON.parse(stripped); } catch {}
  const match = stripped.match(/\{[\s\S]*\}/);
  if (match) try { return JSON.parse(match[0]); } catch {}
  throw new Error("Could not parse JSON from Claude response");
}

// ── RATE LIMITER ──────────────────────────────────────────────────────────────
// checkRateLimit() is called as the FIRST LINE of both callClaude() and
// analyzePhotoWithKey(). It throws on violation — callers catch and show
// the error message to the user. State is persisted in dos_rl (localStorage)
// so limits survive page refreshes. The rolling call window uses timestamps
// rather than a fixed-minute boundary to avoid burst resets at :00.
const RATE = { perMinute: 10, perDay: 100, minMs: 1200 };
function checkRateLimit() {
  const now = Date.now(), today = tdk();
  const rl = ld("dos_rl", { calls: [], daily: {}, last: 0 });
  rl.calls = (rl.calls || []).filter(t => now - t < 60000);
  if (now - (rl.last || 0) < RATE.minMs) throw new Error("Too fast — wait a moment.");
  if (rl.calls.length >= RATE.perMinute) throw new Error("Rate limit: 10 requests/min. Please wait.");
  const count = ((rl.daily || {})[today] || 0);
  if (count >= RATE.perDay) throw new Error(`Daily limit of ${RATE.perDay} AI requests reached.`);
  rl.calls.push(now); rl.last = now;
  rl.daily = { ...(rl.daily || {}), [today]: count + 1 };
  sv("dos_rl", rl);
}

// ── CLAUDE API ────────────────────────────────────────────────────────────────
// Direct browser → Anthropic API. The "anthropic-dangerous-direct-browser-access"
// header is required by Anthropic to allow CORS requests from browsers.
// callClaude() is used by FoodAIChat for text food logging (Haiku by default).
// analyzePhotoWithKey() is used by FoodAIChat's photo upload path (Sonnet, for
// vision quality). Both wrappers call checkRateLimit() before hitting the network.
// The apiKey comes from App state (dos_api_key in localStorage), entered once
// at first launch via ApiKeyScreen, and passed down as a prop.
async function callClaude(apiKey, messages, system, maxTokens, model) {
  checkRateLimit();
  const body = { model: model || "claude-haiku-4-5-20251001", max_tokens: maxTokens || 1000, messages };
  if (system) body.system = system;
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-api-key":apiKey, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
    body: JSON.stringify(body)
  });
  if (!r.ok) { const err = await r.json().catch(()=>({})); throw new Error(err.error?.message || `API error ${r.status}`); }
  const data = await r.json();
  return data.content.filter(c=>c.type==="text").map(c=>c.text).join("");
}

async function analyzePhotoWithKey(apiKey, b64, mime) {
  checkRateLimit();
  const body = {
    model:"claude-sonnet-4-6", max_tokens:1000,
    messages:[{ role:"user", content:[
      { type:"image", source:{ type:"base64", media_type: mime||"image/jpeg", data:b64 } },
      { type:"text", text:'You are a precision nutrition AI. Identify every food item visible. Estimate portions carefully. Return ONLY valid JSON, no markdown:\n{"name":"full meal description","calories":number,"carbs":number,"protein":number,"fat":number,"fiber":number,"items":["item 1 - portion - ~Xcal"],"confidence":"high/medium/low","note":"brief note"}' }
    ]}]
  };
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-api-key":apiKey, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
    body: JSON.stringify(body)
  });
  if (!r.ok) { const e = await r.json().catch(()=>{}); throw new Error(e?.error?.message || "Photo analysis failed"); }
  const data = await r.json();
  return extractJSON(data.content.filter(c=>c.type==="text").map(c=>c.text).join(""));
}

// ── FOOD AI CHAT ──────────────────────────────────────────────────────────────
// FOOD_SYSTEM forces Claude to respond ONLY in one of two JSON shapes.
// extractJSON() in callClaude parses the response — if the format drifts,
// the parser breaks silently. Do not change this prompt without re-testing
// the question→result conversation flow end-to-end.
const FOOD_SYSTEM = `You are a precise nutrition assistant inside a fitness tracking app. Help log food with accurate nutrition data.

RULES:
- When user mentions food without quantity, ask briefly for portion/serving size
- Once you have food + quantity, provide nutrition data
- For branded foods (Raw Farms, Quest, Chipotle, etc.) use brand-specific data
- Always respond in EXACTLY one of these two JSON formats with NO extra text, NO markdown:

FORMAT 1 - Need more info:
{"type":"question","message":"your brief friendly question"}

FORMAT 2 - Ready to log:
{"type":"result","name":"Food name with exact portion","calories":number,"carbs":number,"protein":number,"fat":number,"fiber":number,"message":"brief confirmation"}

Output ONLY valid JSON. Nothing else.`;

// FoodAIChat — full-screen overlay launched from FitnessPage.
// Two input paths: text chat (sendMessage → callClaude) and photo upload
// (handlePhoto → analyzePhotoWithKey). Both paths produce a pendingResult
// that shows a "Log meal" confirm button. onAddMeal() is the callback that
// writes the meal into App's meals state, which FitnessPage then displays.
// Race condition guard: both handlers check `loading || photoScanning`
// so a text reply and a photo scan cannot run simultaneously.
function FoodAIChat({ apiKey, onAddMeal, onClose, favorites, onSaveFavorite }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [pendingResult, setPendingResult] = useState(null);
  const [servingMult, setServingMult] = useState(1);
  const [photoScanning, setPhotoScanning] = useState(false);
  const fileRef = useRef();
  const bottomRef = useRef();

  useEffect(() => { bottomRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages, loading]);

  const sendMessage = async (text) => {
    if (!text.trim() || loading || photoScanning) return;
    const userMsg = {role:"user", content:text.trim()};
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput("");
    setLoading(true);
    setPendingResult(null);
    try {
      const raw = await callClaude(apiKey, newMessages.map(m=>({role:m.role,content:m.content})), FOOD_SYSTEM, 600, "claude-haiku-4-5-20251001");
      const parsed = extractJSON(raw);
      if (parsed.type==="question") {
        setMessages(prev=>[...prev,{role:"assistant",content:parsed.message,isQuestion:true}]);
      } else if (parsed.type==="result") {
        setMessages(prev=>[...prev,{role:"assistant",content:parsed.message,isResult:true,result:parsed}]);

      } else {
        setMessages(prev=>[...prev,{role:"assistant",content:parsed.message||raw,isQuestion:true}]);
      }
    } catch(e) {
      setMessages(prev=>[...prev,{role:"assistant",content:"Try being specific — e.g. \"2 cups raw milk\" or \"1 Quest bar\".",isError:true}]);
    }
    setLoading(false);

      prot: Math.round((pendingResult.protein||0)*m),
      fat:  Math.round((pendingResult.fat||0)*m),
      fiber:Math.round((pendingResult.fiber||0)*m),

    setServingMult(1);
    setPendingResult(null);
    setMessages(prev=>[...prev,{role:"assistant",content:"✅ Added to your log! What else did you eat?",isConfirm:true}]);
  };

  const quickAddFavorite = (fav) => {
    onAddMeal({name:fav.name,cal:fav.cal,carb:fav.carb,prot:fav.prot,fat:fav.fat,fiber:fav.fiber||0});
    setMessages(prev=>[...prev,{role:"assistant",content:`✅ Added "${fav.name}" (${fav.cal} cal) from favorites!`,isConfirm:true}]);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(6,13,26,0.96)",backdropFilter:"blur(4px)",WebkitBackdropFilter:"blur(4px)",zIndex:200,display:"flex",flexDirection:"column",maxWidth:430,margin:"0 auto"}}>
      {/* Header */}
      <div style={{padding:"52px 20px 16px",background:"rgba(255,255,255,0.05)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderBottom:`1px solid rgba(255,255,255,0.10)`,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:18,fontWeight:800}}>AI Food Logger</div>

        </div>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 16px 0"}}>

        {/* Favorites quick-add (shown when no messages yet) */}
        {messages.length===0 && favorites.length>0 && (
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,color:C.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:0.7,marginBottom:8}}>⭐ Favorites</div>

// ── WEEKLY HISTORY BAR CHART ──────────────────────────────────────────────────
// Rendered inside FoodAIChat. Reads from the meals prop (passed through from
// App) and uses getDayInfo() to get each day's calorie target for comparison.
function WeeklyHistory({ meals }) {
  const days = [];
  for (let i=6; i>=0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0);
    const key = dk(d);
    const cal = Math.round((meals[key]||[]).reduce((a,m)=>a+(m.cal||0),0));
    const tgt = TARGETS[getDayInfo(d).type].cal;
    days.push({d, cal, tgt, isToday:i===0});
  }
  const maxCal = Math.max(...days.map(d=>d.cal), 1000);
  return (
    <div style={{margin:"0 16px 16px"}}>
      <div style={{fontSize:10,color:C.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:0.7,marginBottom:10}}>This Week</div>
      <div style={{background:"rgba(255,255,255,0.04)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:`1px solid rgba(255,255,255,0.09)`,borderRadius:18,padding:"14px 12px",boxShadow:"0 4px 20px rgba(0,0,0,0.3)"}}>
        <div style={{display:"flex",gap:4,alignItems:"flex-end",height:70}}>
          {days.map((day,i)=>{
            const barH = day.cal > 0 ? Math.max(4, Math.round((day.cal/maxCal)*54)) : 0;
            const hit = day.cal >= day.tgt * 0.9;
            const barColor = day.isToday ? C.accent : day.cal===0 ? "rgba(255,255,255,0.06)" : hit ? C.green : C.amber;
            return (
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <div style={{fontSize:8,color:day.cal>0?(hit?C.green:C.amber):C.text3,fontWeight:700,minHeight:10}}>
                  {day.cal>0?(day.cal>=1000?Math.round(day.cal/100)/10+"k":day.cal):""}
                </div>
                <div style={{width:"100%",height:54,background:"rgba(255,255,255,0.06)",borderRadius:4,overflow:"hidden",display:"flex",alignItems:"flex-end"}}>
                  <div style={{width:"100%",height:barH+"px",background:barColor,borderRadius:4,transition:"height 0.4s"}}/>
                </div>
                <div style={{fontSize:8,color:day.isToday?C.accent:C.text3,fontWeight:day.isToday?700:400}}>
                  {DAYS_S[day.d.getDay()]}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:12,marginTop:10}}>
          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:C.green}}/><span style={{fontSize:10,color:C.text3}}>On target</span></div>
          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:C.amber}}/><span style={{fontSize:10,color:C.text3}}>Under target</span></div>
          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:C.accent}}/><span style={{fontSize:10,color:C.text3}}>Today</span></div>
        </div>
      </div>
    </div>
  );
}


// ── WEIGHT SPARKLINE ──────────────────────────────────────────────────────────
// Rendered in both HomePage and FitnessPage. Tapping it fires onClick, which
// the parent maps to setShowBwModal(true) to open WeightLogModal.
// bwLog entries are { date: "YYYY-MM-DD", weight: number } stored in dos_bw_log_v1.
function WeightSparkline({ bwLog, onClick }) {
  const last7 = bwLog.slice(-7);
  if (last7.length === 0) {
    return (
      <div onClick={onClick} style={{margin:"16px 16px 0",background:"rgba(255,255,255,0.05)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:`1px solid rgba(255,255,255,0.10)`,borderRadius:18,padding:"14px 16px",cursor:"pointer",boxShadow:"0 6px 24px rgba(0,0,0,0.3)"}}>
        <div style={{fontSize:10,color:C.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>⚖️ Body Weight</div>
        <div style={{fontSize:13,color:C.text3,textAlign:"center",padding:"8px 0"}}>Tap to start logging your weight</div>
      </div>
    );
  }
  const weights = last7.map(e => e.weight);
  const minW = Math.min(...weights);
  const maxW = Math.max(...weights);
  const range = maxW - minW || 1;
  const W = 260, H = 52, pad = 6;
  const pts = weights.map((w, i) => {
    const x = pad + (i / Math.max(weights.length - 1, 1)) * (W - pad * 2);
    const y = H - pad - ((w - minW) / range) * (H - pad * 2);
    return [x, y];
  });
  const polyline = pts.map(p => p.join(",")).join(" ");
  const latest = weights[weights.length - 1];
  const first = weights[0];
  const delta = latest - first;
  const deltaStr = delta === 0 ? "=" : (delta > 0 ? "+" : "") + delta.toFixed(1);
  const deltaColor = delta > 0 ? C.green : delta < 0 ? C.red : C.text3;

  // Area fill path
  const areaPath = `M ${pts[0][0]},${H} ` + pts.map(p => `L ${p[0]},${p[1]}`).join(" ") + ` L ${pts[pts.length-1][0]},${H} Z`;

  return (
    <div onClick={onClick} style={{margin:"16px 16px 0",background:"rgba(255,255,255,0.05)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:`1px solid rgba(255,255,255,0.10)`,borderRadius:18,padding:"14px 16px",cursor:"pointer",boxShadow:"0 6px 24px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.07)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:10,color:C.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>⚖️ Body Weight</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,color:deltaColor,fontWeight:700}}>{deltaStr} lbs</span>
          <span style={{fontSize:15,fontWeight:800,color:C.accent}}>{latest} lbs</span>
        </div>
      </div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible",animation:"sparkleIn 0.5s ease forwards"}}>
        <defs>
          <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#38bdf8" stopOpacity="0.35"/>
            <stop offset="100%" stopColor="#38bdf8" stopOpacity="0.02"/>
          </linearGradient>
          <filter id="sparkGlow">
            <feGaussianBlur stdDeviation="1.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <path d={areaPath} fill="url(#sparkGrad)"/>
        <polyline points={polyline} fill="none" stroke="#38bdf8" strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round" filter="url(#sparkGlow)"/>
        {pts.map((p, i) => (
          <circle key={i} cx={p[0]} cy={p[1]} r={i === pts.length - 1 ? 4 : 2.5}
            fill={i === pts.length - 1 ? "#38bdf8" : "rgba(56,189,248,0.5)"}
            style={{animation:`bwPulse 2s ease infinite ${i===pts.length-1?"":`${i*0.1}s`}`}}/>
        ))}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
        <span style={{fontSize:9,color:C.text3}}>{last7[0]?.date}</span>
        <span style={{fontSize:9,color:C.text3}}>today</span>
      </div>
    </div>
  );
}

// ── CALORIE RING (Apple Watch style) ─────────────────────────────────────────
// Used in HomePage. Animated via the CSS sweepRing keyframe defined in <style>.
// stroke-dashoffset is set as a CSS variable so the animation starts from
// the empty state and sweeps to the filled state on first render.
function CalorieRing({ consumed, target }) {
  const pct = Math.min(1, consumed / target);
  const SIZE = 120, STROKE = 11, R = (SIZE - STROKE) / 2;
  const CIRC = 2 * Math.PI * R;
  const offset = CIRC * (1 - pct);
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <svg width={SIZE} height={SIZE} style={{transform:"rotate(-90deg)"}}>
        <defs>
          <linearGradient id="calRingGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#38bdf8"/>
            <stop offset="100%" stopColor="#14b8a6"/>
          </linearGradient>
          <filter id="ringGlow">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        {/* Track */}
        <circle cx={SIZE/2} cy={SIZE/2} r={R} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={STROKE}/>
        {/* Progress arc */}
        <circle cx={SIZE/2} cy={SIZE/2} r={R} fill="none"
          stroke="url(#calRingGrad)"
          strokeWidth={STROKE}
          strokeLinecap="round"
          strokeDasharray={CIRC}
          strokeDashoffset={offset}
          filter="url(#ringGlow)"
          style={{
            "--ring-full": CIRC,
            "--ring-offset": offset,
            animation: "sweepRing 1s cubic-bezier(0.34,1.2,0.64,1) forwards"
          }}
        />
      </svg>
      <div style={{position:"absolute",display:"flex",flexDirection:"column",alignItems:"center",pointerEvents:"none"}}>
        <div style={{fontSize:18,fontWeight:900,color:C.text,lineHeight:1}}>{Math.round(consumed)}</div>
        <div style={{fontSize:9,color:C.text3,fontWeight:700,letterSpacing:0.5,marginTop:1}}>/ {target}</div>
        <div style={{fontSize:8,color:C.teal,fontWeight:800,letterSpacing:1,textTransform:"uppercase",marginTop:2}}>kcal</div>
      </div>
    </div>
  );
}

// ── HABIT SECTION ────────────────────────────────────────────────────────────
// Rendered inside HomePage. habits = list of {id,name,emoji,color}.
// habitChecked = per-day map. All state lives in App and is passed down.
function HabitSection({ habits, setHabits, habitChecked, setHabitChecked }) {
  const today = tdk();
  const [showAdd, setShowAdd] = useState(false);
  const [newName, setNewName] = useState("");
  const [newEmoji, setNewEmoji] = useState("🎯");

  const toggle = (id) => {
    setHabitChecked(prev => {
      const day = prev[today] || {};
      return { ...prev, [today]: { ...day, [id]: !day[id] } };
    });
  };
  const addHabit = () => {
    if (!newName.trim()) return;
    const colors = [C.accent,C.blue,C.green,C.pink,C.amber,C.teal,C.orange,C.red];
    setHabits(prev => [...prev, { id: Date.now().toString(), name: newName.trim(), emoji: newEmoji, color: colors[prev.length % colors.length] }]);
    setNewName(""); setShowAdd(false);
  };
  const removeHabit = (id) => setHabits(prev => prev.filter(h => h.id !== id));
  const moveHabit = (id, dir) => setHabits(prev => {
    const i = prev.findIndex(h => h.id === id);
    if (i < 0) return prev;
    const swap = i + dir;
    if (swap < 0 || swap >= prev.length) return prev;
    const next = [...prev];
    [next[i], next[swap]] = [next[swap], next[i]];
    return next;
  });

  const todayChecked = habitChecked[today] || {};
  const allDone = habits.length > 0 && habits.every(h => todayChecked[h.id]);
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOverIdx, setDragOverIdx] = useState(null);
  const moveHabitAbs = (from, to) => {
    if (from === to) return;
    setHabits(prev => {
      const next = [...prev];
      const [item] = next.splice(from, 1);
      next.splice(to, 0, item);
      return next;
    });
  };

  return (
    <div style={{margin:"12px 20px 0"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div className="pill-badge">
          <span style={{fontSize:12}}>🎯</span>
          <span style={{fontSize:11,color:C.text,fontWeight:700,letterSpacing:0.5}}>Daily Rituals</span>
        </div>
        <button onClick={()=>setShowAdd(s=>!s)} style={{width:28,height:28,borderRadius:"50%",background:"rgba(56,189,248,0.12)",border:"1px solid rgba(56,189,248,0.25)",color:C.accent,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>+</button>
      </div>

      <div style={{background:"rgba(255,255,255,0.05)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",border:`1px solid ${allDone?"rgba(47,229,165,0.3)":C.border}`,borderRadius:20,overflow:"hidden",boxShadow:allDone?"0 0 24px rgba(47,229,165,0.12),inset 0 1px 0 rgba(255,255,255,0.07)":"0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.07)",transition:"all 0.4s"}}>
        {habits.length === 0 && (
          <div style={{padding:"20px 16px",textAlign:"center",color:C.text3,fontSize:13}}>No habits yet — tap + to add one</div>
        )}
        {habits.map((h, i) => {
          const done = !!todayChecked[h.id];
          const streak = habitStreak(h.id, habitChecked);
          return (
            <div key={h.id}
              draggable={true}
              onDragStart={(e)=>{setDragIdx(i);e.dataTransfer.effectAllowed="move";}}
              onDragEnd={()=>{setDragIdx(null);setDragOverIdx(null);}}
              onDragOver={(e)=>{e.preventDefault();setDragOverIdx(i);}}
              onDrop={(e)=>{e.preventDefault();moveHabitAbs(dragIdx,i);setDragIdx(null);setDragOverIdx(null);}}
              style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",borderBottom:i<habits.length-1?`1px solid rgba(255,255,255,0.07)`:"none",background:dragOverIdx===i&&dragIdx!==i?"rgba(56,189,248,0.07)":done?"rgba(47,229,165,0.06)":"rgba(255,255,255,0.01)",opacity:dragIdx===i?0.38:1,transition:"background 0.15s,opacity 0.15s",cursor:"grab",borderLeft:dragOverIdx===i&&dragIdx!==i?`3px solid ${C.accent}`:"3px solid transparent"}}>
              {/* Grab handle */}
              <div style={{color:C.text3,fontSize:14,flexShrink:0,opacity:0.4,letterSpacing:-1,userSelect:"none"}}>⠿</div>

              </button>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:600,color:done?C.text3:C.text,textDecoration:done?"line-through":"none",transition:"all 0.25s",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.name}</div>
                {streak > 0 && <div style={{fontSize:11,color:C.amber,fontWeight:700,marginTop:1}}>🔥 {streak} {streak===1?"day":"days"}</div>}
              </div>
              <button onClick={()=>removeHabit(h.id)} style={{color:C.text3,fontSize:16,padding:"4px 6px",flexShrink:0,opacity:0.5}}>×</button>
            </div>
          );
        })}

        {showAdd && (
          <div style={{padding:"14px 16px",borderTop:`1px solid rgba(255,255,255,0.08)`,background:"rgba(255,255,255,0.03)"}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
              {HABIT_EMOJIS.map(e=>(
                <button key={e} onClick={()=>setNewEmoji(e)} style={{width:34,height:34,borderRadius:10,background:newEmoji===e?"rgba(56,189,248,0.18)":C.bg4,border:newEmoji===e?"1px solid rgba(56,189,248,0.4)":"1px solid rgba(255,255,255,0.06)",fontSize:18}}>{e}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addHabit()} placeholder="Habit name…" style={{flex:1,background:"rgba(255,255,255,0.06)",backdropFilter:"blur(8px)",border:`1px solid rgba(255,255,255,0.14)`,borderRadius:12,padding:"10px 12px",fontSize:14,color:C.text}} autoFocus/>
              <button onClick={addHabit} style={{background:`linear-gradient(135deg,${C.accent},${C.teal})`,borderRadius:12,padding:"10px 16px",fontSize:14,fontWeight:700,color:"white",flexShrink:0}}>Add</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── GYM HEATMAP ───────────────────────────────────────────────────────────────
// Rendered inside HomePage. attend is the dos_attend_v7 map keyed by date string,
// where each value is { gym: bool, kb: bool }. Uses getDayInfo() to decide
// whether a past day was *supposed* to be a workout day (for context coloring).
function GymHeatmap({ attend }) {
  const today = new Date(); today.setHours(0,0,0,0);
  // Build 4 weeks = 28 days, starting from 27 days ago up to today
  const cells = [];
  for (let i = 27; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const key = dk(d);
    const att = attend[key] || {};
    const didGym = att.gym;
    const didKb = att.kb;
    const isToday = i === 0;
    const info = getDayInfo(d);
    const wasWorkoutDay = info.isGym || info.isKick;
    cells.push({ d, key, didGym, didKb, isToday, wasWorkoutDay, dow: d.getDay() });
  }
  // group into weeks (rows)
  const weeks = [];
  for (let i = 0; i < 4; i++) weeks.push(cells.slice(i * 7, i * 7 + 7));

  const getCellStyle = (cell) => {
    if (cell.didGym && cell.didKb) return { bg: "#38bdf8", glow: "0 0 8px rgba(56,189,248,0.7)", opacity: 1 };

    if (cell.didKb) return { bg: "#2fe5a5", glow: "0 0 6px rgba(47,229,165,0.5)", opacity: 1 };
    if (!cell.wasWorkoutDay) return { bg: "rgba(255,255,255,0.04)", glow: "none", opacity: 0.6 }; // rest day
    return { bg: "rgba(255,255,255,0.02)", glow: "none", opacity: 1 }; // missed workout day
  };

  return (
    <div style={{margin:"12px 16px 0",background:"rgba(255,255,255,0.04)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",border:`1px solid rgba(255,255,255,0.10)`,borderRadius:20,padding:"14px 16px",boxShadow:"0 8px 32px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.06)"}}>

      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>

          <div key={i} style={{fontSize:8,color:C.text3,textAlign:"center",fontWeight:700}}>{d}</div>

      {weeks.map((week, wi) => (
        <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
          {week.map((cell, ci) => {

            return (
              <div key={cell.key} title={`${cell.d.toLocaleDateString()}
${cell.didGym?"Gym ":""}${cell.didKb?"KB":""}`}
                style={{
                  aspectRatio:"1",
                  borderRadius:4,
                  background:cs.bg,
                  boxShadow:cell.isToday?`0 0 0 2px #38bdf8, ${cs.glow}`:cs.glow,
                  opacity:cs.opacity,
                  animation:cell.didGym||cell.didKb?`heatPop 0.3s ${wi*0.05+ci*0.02}s both`:undefined,
                  transition:"background 0.3s"
                }}/>

          })}
        </div>
      ))}
      {/* Legend */}
      <div style={{display:"flex",gap:10,marginTop:10,flexWrap:"wrap"}}>
        {[["#38bdf8","Gym + KB"],["#f5c842","Gym"],["#2fe5a5","Kickboxing"],["rgba(255,255,255,0.06)","Missed"]].map(([c,l])=>(

        ))}
      </div>
    </div>
  );
}

// ── WEIGHT LOG MODAL ──────────────────────────────────────────────────────────
// Opened from both HomePage (setShowBwModal) and FitnessPage. Appends a
// { date, weight } entry to bwLog, which is persisted in dos_bw_log_v1.
// WeightSparkline in both pages reads bwLog to render the trend chart.
// The lean bulk progress bar in HomePage also reads bwLog to compute current %.
function WeightLogModal({ bwLog, setBwLog, onClose }) {
  const [inputVal, setInputVal] = useState("");
  const [saved, setSaved] = useState(false);

  const handleSave = () => {
    const w = parseFloat(inputVal);
    if (!w || w < 50 || w > 400) return;
    const today = tdk();
    const newLog = bwLog.filter(e => e.date !== today);
    newLog.push({ date: today, weight: w });
    newLog.sort((a, b) => a.date.localeCompare(b.date));
    setBwLog(newLog);
    setSaved(true);
    setTimeout(onClose, 800);
  };

  const last5 = [...bwLog].slice(-5).reverse();

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:250,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="slide-up" style={{background:"rgba(9,24,32,0.96)",backdropFilter:"blur(28px)",WebkitBackdropFilter:"blur(28px)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:"24px 24px 0 0",padding:"24px 20px calc(24px + env(safe-area-inset-bottom))",width:"100%",maxWidth:430,boxShadow:"0 -12px 48px rgba(0,0,0,0.5)"}}>
        <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>⚖️ Log Weight</div>
        <div style={{fontSize:12,color:C.text2,marginBottom:20}}>Goal: {PROFILE.currentWeight} → {PROFILE.goalWeight} lbs (lean bulk)</div>
        <div style={{display:"flex",gap:10,marginBottom:20}}>
          <input
            type="number" step="0.1" min="80" max="400"
            placeholder={`e.g. ${PROFILE.currentWeight}`}
            value={inputVal}
            onChange={e=>setInputVal(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&handleSave()}
            style={{flex:1,background:"rgba(255,255,255,0.07)",backdropFilter:"blur(8px)",border:`1px solid rgba(255,255,255,0.15)`,borderRadius:14,padding:"14px 16px",fontSize:18,fontWeight:700,color:C.text}}
            autoFocus
          />
          <button onClick={handleSave} style={{background:saved?C.green:`linear-gradient(135deg,${C.accent},${C.teal})`,border:"none",borderRadius:14,padding:"14px 20px",fontSize:15,fontWeight:800,color:"white",minWidth:80,transition:"background 0.3s"}}>
            {saved?"✓ Saved":"Save"}
          </button>
        </div>
        {last5.length > 0 && (
          <div>
            <div style={{fontSize:10,color:C.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Recent Entries</div>
            {last5.map((e) => (
              <div key={e.date} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontSize:13,color:C.text2}}>{e.date}</span>
                <span style={{fontSize:13,fontWeight:700,color:C.accent}}>{e.weight} lbs</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// MacroCard uses useCountUp so each card's number animates from 0 on mount.
// Must be a real component (not an inline render) so React hooks are valid.
function MacroCard({ m, pct }) {
  const display = useCountUp(m.val, 700);
  const over = m.val > m.tgt;
  const diff = m.tgt - m.val;
  const delta = diff > 0 ? {txt:`${diff}${m.unit} left`,col:C.text3} : over ? {txt:`${-diff}${m.unit} over`,col:C.red} : {txt:"✓ on target",col:C.green};
  return (
    <div className="fade-in" style={{background:"rgba(255,255,255,0.05)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:`1px solid ${m.val>0?m.color+"55":"rgba(255,255,255,0.10)"}`,borderRadius:18,padding:"11px 8px",boxShadow:m.val>0?`0 4px 20px ${m.color}22`:"0 4px 16px rgba(0,0,0,0.3)",transition:"box-shadow 0.3s,border 0.3s"}}>
      <div style={{fontSize:9,color:m.color,fontWeight:800,textTransform:"uppercase",letterSpacing:0.5,marginBottom:5}}>{m.label}</div>
      <div style={{fontSize:18,fontWeight:900,color:over?C.red:C.text,letterSpacing:-0.5,lineHeight:1}}>{display}{m.unit}</div>
      <div style={{fontSize:9,color:C.text3,marginTop:2}}>/{m.tgt}{m.unit}</div>
      <div style={{fontSize:9,fontWeight:700,color:delta.col,marginTop:3,lineHeight:1}}>{delta.txt}</div>
      <div style={{height:3,background:"rgba(255,255,255,0.08)",borderRadius:2,marginTop:7,overflow:"hidden"}}>
        <div style={{height:"100%",borderRadius:2,width:pct(m.val,m.tgt)+"%",background:over?C.red:m.color,transition:"width 0.8s cubic-bezier(0.34,1.56,0.64,1)",boxShadow:`0 0 8px ${m.color}99`}}/>
      </div>
    </div>
  );
}

// ── SUPPLEMENTS PAGE ──────────────────────────────────────────────────────────
// supps is the supplement list (dos_supps_v1); checked is the per-day check
// state (dos_supp_checked_v1 keyed by "YYYY-MM-DD"). Each day starts fresh —
// checked[tdk()] is empty until the user marks items. Both are persisted in App.
// The confetti burst fires when taken === total (all supplements checked off).
function SupplementsPage({ supps, setSupps, checked, setChecked }) {
  const today = tdk();
  const total = supps.length;
  const taken = supps.filter(s=>(checked[today]||{})[s.id]).length;
  const suppPct = total > 0 ? Math.round(taken/total*100) : 0;
  const animPct = useCountUp(suppPct, 600);
  const todayChecked = checked[today]||{};
  const [showAdd, setShowAdd] = useState(false);
  const [newName, setNewName] = useState("");
  const [newDose, setNewDose] = useState("");
  const [newTime, setNewTime] = useState("morning");

  const toggle = (id) => setChecked(prev=>{const tc=prev[today]||{};return{...prev,[today]:{...tc,[id]:!tc[id]}};});
  const removeSupp = (id) => setSupps(prev=>prev.filter(s=>s.id!==id));
  const addSupp = () => {
    if (!newName.trim()) return;
    setSupps(prev=>[...prev,{id:Date.now().toString(),name:newName.trim(),dose:newDose.trim()||"1 serving",time:newTime}]);
    setNewName(""); setNewDose(""); setShowAdd(false);
  };

  const morning = supps.filter(s=>s.time==="morning");
  const evening = supps.filter(s=>s.time==="evening");
  const takenM = morning.filter(s=>todayChecked[s.id]).length;
  const takenE = evening.filter(s=>todayChecked[s.id]).length;

  useEffect(() => {
    if (taken === total && total > 0 && typeof confetti !== 'undefined') {
      confetti({ particleCount: 90, spread: 75, origin: { y: 0.55 } });
    }
  }, [taken, total]);

  // Drag-and-drop reordering
  const suppDragId = React.useRef(null);
  const [suppDragOver, setSuppDragOver] = useState(null);
  const moveSupp = (fromId, toId) => {
    setSupps(prev => {
      const from = prev.findIndex(s => s.id === fromId);
      const to   = prev.findIndex(s => s.id === toId);
      if (from === -1 || to === -1 || from === to) return prev;
      const next = [...prev];
      const [item] = next.splice(from, 1);
      next.splice(to, 0, item);
      return next;
    });
  };

  const renderSuppItem = (s) => (
    <div
      draggable
      onDragStart={()=>{ suppDragId.current=s.id; setSuppDragOver(null); }}
      onDragEnd={()=>{ suppDragId.current=null; setSuppDragOver(null); }}
      onDragOver={e=>{ e.preventDefault(); setSuppDragOver(s.id); }}
      onDrop={e=>{ e.preventDefault(); if(suppDragId.current&&suppDragId.current!==s.id) moveSupp(suppDragId.current,s.id); setSuppDragOver(null); }}
      style={{display:"flex",alignItems:"center",gap:12,padding:"13px 14px",background:todayChecked[s.id]?"rgba(47,229,165,0.08)":"rgba(255,255,255,0.04)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:`1px solid ${suppDragOver===s.id?"rgba(56,189,248,0.5)":todayChecked[s.id]?"rgba(47,229,165,0.28)":"rgba(255,255,255,0.09)"}`,borderRadius:16,marginBottom:8,transition:"background 0.3s,border 0.3s,box-shadow 0.3s",boxShadow:todayChecked[s.id]?"0 2px 16px rgba(47,229,165,0.12)":undefined,cursor:"grab",borderLeft:suppDragOver===s.id?`3px solid ${C.accent}`:"3px solid transparent"}}>
      <button onClick={()=>toggle(s.id)} style={{width:30,height:30,borderRadius:"50%",border:`2px solid ${todayChecked[s.id]?C.green:C.border2}`,background:todayChecked[s.id]?`linear-gradient(135deg,${C.green},${C.teal})`:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,color:todayChecked[s.id]?"#0a0a0c":"transparent",transition:"all 0.25s",boxShadow:todayChecked[s.id]?`0 0 10px rgba(47,229,165,0.4)`:undefined}}>
        {todayChecked[s.id]?"✓":""}
      </button>
      <div style={{flex:1}}>
        <div style={{fontSize:14,fontWeight:600,color:todayChecked[s.id]?C.text3:C.text,textDecoration:todayChecked[s.id]?"line-through":"none",transition:"color 0.2s"}}>{s.name}</div>
        <div style={{fontSize:11,color:C.text3,marginTop:2}}>{s.dose}</div>
      </div>
      <button onClick={()=>removeSupp(s.id)} style={{color:C.text3,fontSize:18,padding:"0 6px",lineHeight:1}}>×</button>
    </div>
  );

  return (
    <div>
      <div style={{padding:"52px 20px 16px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-30,right:-10,width:140,height:140,borderRadius:"50%",background:"radial-gradient(circle,rgba(45,212,191,0.12) 0%,transparent 70%)",pointerEvents:"none"}}/>
        <div style={{fontSize:32,fontWeight:900,letterSpacing:-1,background:`linear-gradient(90deg,${C.text},${C.teal})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>Supplements</div>
        <div style={{fontSize:13,color:C.text2,marginTop:4}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
      </div>

      {/* Progress */}
      <div style={{margin:"0 16px 16px",background:taken===total&&total>0?"rgba(245,200,66,0.08)":"rgba(255,255,255,0.06)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",border:`1px solid ${taken===total&&total>0?"rgba(245,200,66,0.35)":"rgba(255,255,255,0.12)"}`,borderRadius:20,padding:"16px 18px",boxShadow:taken===total&&total>0?"0 8px 32px rgba(245,200,66,0.15),inset 0 1px 0 rgba(255,255,255,0.08)":"0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.07)",transition:"all 0.4s"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:15,fontWeight:800,color:taken===total&&total>0?C.amber:C.text}}>
            {taken===total&&total>0?"✨ All done today!":taken+"/"+total+" taken"}
          </div>
          <div className="num-pop" style={{fontSize:26,fontWeight:900,color:taken===total&&total>0?C.amber:C.accent,letterSpacing:-1}}>{animPct}%</div>
        </div>
        <div style={{height:6,background:"rgba(255,255,255,0.08)",borderRadius:4,overflow:"hidden"}}>
          <div style={{height:"100%",width:suppPct+"%",background:taken===total&&total>0?`linear-gradient(90deg,${C.amber},${C.orange})`:`linear-gradient(90deg,${C.teal},${C.accent})`,borderRadius:4,transition:"width 0.6s cubic-bezier(0.34,1.56,0.64,1)",boxShadow:taken===total&&total>0?`0 0 12px rgba(245,200,66,0.5)`:undefined}}/>
        </div>
      </div>

      {/* Morning stack */}
      {morning.length>0&&(
        <div style={{padding:"0 16px",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div className="pill-badge">
              <span style={{fontSize:12}}>🌅</span>
              <span style={{fontSize:11,color:C.amber,fontWeight:700,letterSpacing:0.5}}>Morning Stack</span>
              <span style={{fontSize:11,color:C.text3}}>{takenM}/{morning.length}</span>
            </div>
          </div>
          {morning.map(s=><React.Fragment key={s.id}>{renderSuppItem(s)}</React.Fragment>)}
        </div>
      )}

      {/* Evening stack */}
      {evening.length>0&&(
        <div style={{padding:"0 16px",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div className="pill-badge">
              <span style={{fontSize:12}}>🌙</span>
              <span style={{fontSize:11,color:C.accent,fontWeight:700,letterSpacing:0.5}}>Evening Stack</span>
              <span style={{fontSize:11,color:C.text3}}>{takenE}/{evening.length}</span>
            </div>
          </div>
          {evening.map(s=><React.Fragment key={s.id}>{renderSuppItem(s)}</React.Fragment>)}
        </div>
      )}

      {/* Add supplement */}
      <div style={{padding:"0 16px",marginBottom:16}}>
        {!showAdd?(
          <button onClick={()=>setShowAdd(true)} style={{width:"100%",background:"rgba(56,189,248,0.08)",backdropFilter:"blur(8px)",border:"1px solid rgba(56,189,248,0.2)",borderRadius:16,padding:"14px 0",fontSize:14,fontWeight:700,color:C.accent}}>
            + Add Supplement
          </button>
        ):(
          <div style={{background:"rgba(255,255,255,0.05)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",border:`1px solid rgba(255,255,255,0.13)`,borderRadius:18,padding:16,boxShadow:"0 8px 32px rgba(0,0,0,0.4)"}}>
            <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>New Supplement</div>
            <input placeholder="Name (e.g. Creatine)" value={newName} onChange={e=>setNewName(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,0.06)",border:`1px solid rgba(255,255,255,0.14)`,borderRadius:12,padding:"10px 12px",fontSize:14,color:C.text,marginBottom:8}}/>
            <input placeholder="Dose (e.g. 5g)" value={newDose} onChange={e=>setNewDose(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,0.06)",border:`1px solid rgba(255,255,255,0.14)`,borderRadius:12,padding:"10px 12px",fontSize:14,color:C.text,marginBottom:10}}/>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              {["morning","evening"].map(t=>(
                <button key={t} onClick={()=>setNewTime(t)} style={{flex:1,padding:"8px 0",borderRadius:12,border:`1px solid ${newTime===t?"rgba(56,189,248,0.4)":"rgba(255,255,255,0.10)"}`,background:newTime===t?"rgba(56,189,248,0.12)":"rgba(255,255,255,0.04)",color:newTime===t?C.accent:C.text2,fontSize:13,fontWeight:700}}>
                  {t==="morning"?"🌅 Morning":"🌙 Evening"}
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={addSupp} style={{flex:1,background:`linear-gradient(135deg,${C.accent},${C.teal})`,border:"none",borderRadius:12,padding:"11px 0",fontSize:14,fontWeight:700,color:"white"}}>Add</button>
              <button onClick={()=>setShowAdd(false)} style={{flex:1,background:"rgba(255,255,255,0.05)",border:`1px solid rgba(255,255,255,0.10)`,borderRadius:12,padding:"11px 0",fontSize:14,color:C.text2}}>Cancel</button>
            </div>
          </div>
        )}
      </div>

      {/* Note */}
      <div style={{margin:"0 16px 16px",background:"rgba(255,255,255,0.04)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:`1px solid rgba(255,255,255,0.09)`,borderRadius:16,padding:"12px 14px"}}>
        <div style={{fontSize:11,color:C.text3,lineHeight:1.7}}>
          💡 <strong style={{color:C.text2}}>Lean bulk stack:</strong> Take creatine + vitamin D + omega-3 + zinc with your first meal. Magnesium 30–60 min before bed for recovery and sleep quality.
        </div>
      </div>
    </div>
  );
}

// ── VOCAB PAGE ────────────────────────────────────────────────────────────────
// ── VOCAB PAGE ────────────────────────────────────────────────────────────────
// vocab = today's 3 words (dos_vocab_v7_<date>), regenerated each new day via
// getTodayWords(). learned = all-time learned words (dos_learned_v7).
// The camera recording feature uses MediaRecorder + getUserMedia to capture
// a short pronunciation video, stored as a base64 data URL inside the word
// object. Videos survive page refreshes but are large — localStorage can fill
// up if many words are recorded. Object URLs are revoked after save/discard
// to prevent memory leaks.
function VocabPage({ vocab, setVocab, learned, setLearned }) {
  const [vtab, setVtab] = useState("today");
  const [recState, setRecState] = useState("idle");
  const [recIdx, setRecIdx] = useState(null);
  const [prevVid, setPrevVid] = useState(null);
  const [prevIdx, setPrevIdx] = useState(null);
  const [vidError, setVidError] = useState("");
  const mrRef = useRef();
  const chunksRef = useRef([]);
  const streamRef = useRef(null);
  const liveVideoRef = useRef(null);
  const [showVoiceSettings, setShowVoiceSettings] = useState(false);
  const [ttsPrefs, setTtsPrefs] = useState(()=>loadTTSPrefs());
  const [browserVoices, setBrowserVoices] = useState([]);

  useEffect(()=>{ return ()=>{ if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop()); }; },[]);

  useEffect(()=>{
    const load = ()=>{
      const vs = (window.speechSynthesis?.getVoices()||[]).filter(v=>v.lang.startsWith("en"));
      if(vs.length) setBrowserVoices(vs);
    };
    load();
    if(window.speechSynthesis) window.speechSynthesis.addEventListener("voiceschanged",load);
    return ()=>{ if(window.speechSynthesis) window.speechSynthesis.removeEventListener("voiceschanged",load); };
  },[]);

  const updateTtsPrefs = (patch) => {
    const next = {...ttsPrefs,...patch};
    setTtsPrefs(next);
    saveTTSPrefs(next);
  };

  const markLearned = (i) => {
    const w = vocab[i]; const nl = !w.learned;
    setVocab(prev=>prev.map((x,j)=>j===i?{...x,learned:nl}:x));
    if(nl) { setLearned(prev=>prev.find(l=>l.word===w.word)?prev:[{word:w.word,pos:w.pos,definition:w.definition,date:tdk(),videoUrl:w.videoUrl||null},...prev]); }
    else { setLearned(prev=>prev.filter(l=>l.word!==w.word)); }
  };

  const startRec = async (i) => {
    setVidError("");
    if (!navigator.mediaDevices?.getUserMedia) { setVidError("Camera not available. Open via HTTPS or localhost."); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"},audio:true});
      streamRef.current = stream; chunksRef.current = [];
      // Attach live preview
      if (liveVideoRef.current) { liveVideoRef.current.srcObject = stream; liveVideoRef.current.play().catch(()=>{}); }
      const mimeTypes = ["video/webm;codecs=vp9,opus","video/webm;codecs=vp8,opus","video/webm","video/mp4"];
      const supported = mimeTypes.find(t=>MediaRecorder.isTypeSupported(t))||"";
      const mr = new MediaRecorder(stream, supported?{mimeType:supported}:{});
      mr.ondataavailable = e=>{ if(e.data&&e.data.size>0) chunksRef.current.push(e.data); };
      mr.onstop = ()=>{
        const blob = new Blob(chunksRef.current,{type:mr.mimeType||"video/webm"});
        setPrevVid(URL.createObjectURL(blob)); setPrevIdx(i); setRecState("preview");
        stream.getTracks().forEach(t=>t.stop()); streamRef.current=null;
        if (liveVideoRef.current) { liveVideoRef.current.srcObject = null; }
      };
      mrRef.current=mr; mr.start(200); setRecIdx(i); setRecState("recording");
    } catch(err) {
      setVidError(err.name==="NotAllowedError"?"Camera permission denied.":err.name==="NotFoundError"?"No camera found.":"Camera error: "+err.message);
    }
  };

  const stopRec = ()=>{ if(mrRef.current&&recState==="recording") mrRef.current.stop(); };

  const saveVid = async ()=>{
    if(!prevVid||prevIdx===null) return;
    setRecState("saving");
    try {
      const resp = await fetch(prevVid); const blob = await resp.blob();
      const reader = new FileReader();
      reader.onload = ()=>{
        const dataUrl = reader.result;
        const w = vocab[prevIdx];
        setVocab(prev=>prev.map((x,i)=>i===prevIdx?{...x,videoUrl:dataUrl}:x));
        setLearned(prev=>{ const ex=prev.find(l=>l.word===w.word); if(ex) return prev.map(l=>l.word===w.word?{...l,videoUrl:dataUrl}:l); return [{word:w.word,pos:w.pos,definition:w.definition,date:tdk(),videoUrl:dataUrl},...prev]; });
        URL.revokeObjectURL(prevVid);
        setPrevVid(null); setPrevIdx(null); setRecState("idle"); setRecIdx(null);
      };
      reader.onerror=()=>{ setVidError("Failed to save. Try a shorter recording."); setRecState("preview"); };
      reader.readAsDataURL(blob);
    } catch(err){ setVidError("Save failed: "+err.message); setRecState("preview"); }
  };

  const discardVid = ()=>{ if(prevVid) URL.revokeObjectURL(prevVid); setPrevVid(null); setPrevIdx(null); setRecState("idle"); setRecIdx(null); };

  return (
    <div>
      {/* ── LIVE CAMERA OVERLAY (while recording) ── */}

        <div style={{position:"fixed",inset:0,background:"#000",zIndex:300,display:"flex",flexDirection:"column"}} className="pop-in">

                ■  Stop Recording

            </div>
          </div>
        </div>
      )}

      {/* ── PREVIEW / SAVE MODAL ── */}
      {(recState==="preview"||recState==="saving")&&prevVid&&(

// ── ROOT APP ──────────────────────────────────────────────────────────────────
// Single source of truth for all persistent state. Every useState initializer
// calls ld() to hydrate from localStorage on mount. Every state variable has
// a corresponding useEffect that calls sv() to persist on every change.
// No context, no reducers — all state flows down as props.
// If !apiKey, renders ApiKeyScreen instead of the full app (first-launch gate).
// Page routing is a simple string — no router library.
function App() {
  const [page, setPage]       = useState("home");
  const [scrollY, setScrollY] = useState(0);
  const [apiKey, setApiKey]   = useState(()=>ld("dos_api_key",""));
  const [meals, setMeals]     = useState(()=>ld("dos_meals_v7",{}));
  const [attend, setAttend]   = useState(()=>ld("dos_attend_v7",{}));
  const [usage, setUsage]     = useState(()=>ld("dos_usage_v7",{}));
  const [vocab, setVocab]     = useState(()=>{ const k="dos_vocab_v7_"+tdk(); const s=ld(k,null); return(s&&s.length===3)?s:getTodayWords(); });
  const [learned, setLearned] = useState(()=>ld("dos_learned_v7",[]));
  const [favorites, setFavorites] = useState(()=>ld("dos_favorites_v1",[]));
  const [supps, setSupps]     = useState(()=>ld("dos_supps_v1", DEFAULT_SUPPLEMENTS));
  const [suppChecked, setSuppChecked] = useState(()=>ld("dos_supp_checked_v1",{}));
  const [bwLog, setBwLog] = useState(()=>ld("dos_bw_log_v1",[]));
  const [habits, setHabits] = useState(()=>ld("dos_habits_v1", DEFAULT_HABITS));
  const [habitChecked, setHabitChecked] = useState(()=>ld("dos_habit_checked_v1",{}));
  const [dayOverrides, setDayOverrides] = useState(()=>ld("dos_day_overrides_v1",{}));
  const [showBwModal, setShowBwModal] = useState(false);

  useEffect(()=>{ const k=tdk(); setUsage(prev=>{const u={...prev,[k]:(prev[k]||0)+1};sv("dos_usage_v7",u);return u;}); },[]);
  useEffect(()=>{ sv("dos_meals_v7",meals); },[meals]);
  useEffect(()=>{ sv("dos_attend_v7",attend); },[attend]);
  useEffect(()=>{ sv("dos_vocab_v7_"+tdk(),vocab); },[vocab]);
  useEffect(()=>{ sv("dos_learned_v7",learned); },[learned]);
  useEffect(()=>{ sv("dos_favorites_v1",favorites); },[favorites]);
  useEffect(()=>{ sv("dos_supps_v1",supps); },[supps]);
  useEffect(()=>{ sv("dos_supp_checked_v1",suppChecked); },[suppChecked]);
  useEffect(()=>{ sv("dos_bw_log_v1",bwLog); },[bwLog]);
  useEffect(()=>{ sv("dos_habits_v1",habits); },[habits]);
  useEffect(()=>{ sv("dos_habit_checked_v1",habitChecked); },[habitChecked]);
  useEffect(()=>{ sv("dos_day_overrides_v1",dayOverrides); },[dayOverrides]);

  // Track scroll for hero parallax (only on home page)
  useEffect(()=>{
    if (page !== "home") return;
    const el = document.getElementById("root");
    const handler = () => setScrollY(window.scrollY || document.documentElement.scrollTop);
    window.addEventListener("scroll", handler, {passive:true});
    return () => window.removeEventListener("scroll", handler);
  }, [page]);
  useEffect(()=>{ if(page!=="home") setScrollY(0); }, [page]);

  if (!apiKey) return <ApiKeyScreen onSave={setApiKey}/>;

  return (
    <div>
      {showBwModal&&<WeightLogModal bwLog={bwLog} setBwLog={setBwLog} onClose={()=>setShowBwModal(false)}/>}
      {/* key=page triggers page-enter animation on every tab switch */}
      <div key={page} className="page-enter">
        {page==="home"        && <HomePage      meals={meals} usage={usage} supps={supps} suppChecked={suppChecked} setPage={setPage} scrollY={scrollY} bwLog={bwLog} setShowBwModal={setShowBwModal}/>}
        {page==="fitness"     && <FitnessPage   meals={meals} setMeals={setMeals} attend={attend} setAttend={setAttend} apiKey={apiKey} favorites={favorites} setFavorites={setFavorites} bwLog={bwLog} setBwLog={setBwLog} dayOverrides={dayOverrides} setDayOverrides={setDayOverrides}/>}
        {page==="habits"      && <HabitsPage    habits={habits} setHabits={setHabits} habitChecked={habitChecked} setHabitChecked={setHabitChecked}/>}
        {page==="vocab"       && <VocabPage     vocab={vocab} setVocab={setVocab} learned={learned} setLearned={setLearned}/>}
        {page==="supplements" && <SupplementsPage supps={supps} setSupps={setSupps} checked={suppChecked} setChecked={setSuppChecked}/>}
      </div>
      <Nav page={page} setPage={setPage}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
