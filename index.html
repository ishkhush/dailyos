  const shiftMonth = (d) => setCal(c => { let m = c.m + d, y = c.y; if (m < 0) { m = 11; y--; } if (m > 11) { m = 0; y++; } return { y, m }; });
  const gallery = [...photos].reverse();

  const card = { background:"rgba(255,255,255,0.05)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"1px solid rgba(255,255,255,0.10)",borderRadius:18,boxShadow:"0 6px 24px rgba(0,0,0,0.3)" };

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>

        title={byDate[sheetDate] ? "Replace photo" : "Add progress photo"}

        onLibrary={()=>{ libraryRef.current && libraryRef.current.click(); setSheetDate(null); }}
        onClose={()=>setSheetDate(null)}/>}

      {/* Header */}

        <div className="pill-badge" style={{marginBottom:10,position:"relative",background:"color-mix(in srgb, var(--tab-5) 10%, transparent)",border:"1px solid color-mix(in srgb, var(--tab-5) 24%, transparent)"}}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--tab-5)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3l2-3h8l2 3h3a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="3.8"/></svg>
          <span style={{fontSize:12,fontWeight:700,color:C.text,letterSpacing:0.2}}>Body</span>
        </div>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:40,fontWeight:900,letterSpacing:-1.5,lineHeight:0.92,position:"relative",background:`linear-gradient(100deg,${C.text},var(--tab-5))`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>Progress</div>
        <div style={{fontSize:13,color:C.text2,marginTop:6,position:"relative"}}>

        </div>

          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--on-accent)" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3l2-3h8l2 3h3a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="3.8"/></svg>
          {byDate[todayKey] ? "Replace today's photo" : "Add today's photo"}
        </button>

        {/* Empty state */}
        {!loading && photos.length === 0 && (
          <div style={{...card,padding:"34px 22px",textAlign:"center",marginBottom:16}}>

        {/* Library grid */}

              {gallery.map(p=>(
                <div key={p.date} className="tap" onClick={()=>setViewerDate(p.date)} style={{position:"relative",aspectRatio:"4/5",borderRadius:12,overflow:"hidden",cursor:"pointer",border:"1px solid rgba(255,255,255,0.08)"}}>
                  <img src={p.url} alt={p.date} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                  <span style={{position:"absolute",bottom:0,left:0,right:0,padding:"10px 6px 4px",fontSize:9,fontWeight:700,color:"#fff",background:"linear-gradient(transparent,rgba(0,0,0,0.7))"}}>{new Date(p.date+"T00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
                </div>
              ))}
            </div>

        <div style={{fontSize:11,color:C.text3,textAlign:"center",marginTop:16,lineHeight:1.5}}>🔒 Stored on this device only — never uploaded.<br/>{setShowBackupSheet ? <button className="tap" onClick={()=>{ haptic(); setShowBackupSheet(true); }} style={{background:"none",border:"none",padding:0,fontSize:11,fontWeight:700,color:C.teal}}>Back up everything →</button> : "Add to Home Screen and download key photos to keep a backup."}</div>
      </div>

      {viewerDate && <ProgressViewer photos={photos} startDate={viewerDate} weightByDate={weightByDate} onClose={()=>setViewerDate(null)} onDelete={removePhoto}/>}
    </div>
  );
}

function App() {

  const [apiKey, setApiKey]   = useState(()=>ld("dos_api_key",""));
  const [meals, setMeals]     = useState(()=>ld("dos_meals_v7",{}));
  const [attend, setAttend]   = useState(()=>ld("dos_attend_v7",{}));
  const [usage, setUsage]     = useState(()=>ld("dos_usage_v7",{}));
  const [favorites, setFavorites] = useState(()=>ld("dos_favorites_v1",[]));
  const [supps, setSupps]     = useState(()=>ld("dos_supps_v1", DEFAULT_SUPPLEMENTS));
  const [suppChecked, setSuppChecked] = useState(()=>ld("dos_supp_checked_v1",{}));
  const [bwLog, setBwLog] = useState(()=>ld("dos_bw_log_v1",[]));
  const [habits, setHabits] = useState(()=>ld("dos_habits_v1", DEFAULT_HABITS));
  const [habitChecked, setHabitChecked] = useState(()=>ld("dos_habit_checked_v1",{}));
  const [dayOverrides, setDayOverrides] = useState(()=>ld("dos_day_overrides_v1",{}));
  const [water, setWater] = useState(()=>ld("dos_water_v1",{date:"",count:0}));
  const [energy, setEnergy] = useState(()=>ld("dos_energy_v1",{}));
  const [prayerChecked, setPrayerChecked] = useState(()=>ld("dos_prayer_checked_v1",{}));
  const [prLog, setPrLog] = useState(()=>ld("dos_pr_v1",{}));
  const [showBwModal, setShowBwModal] = useState(false);
  const [theme, setTheme] = useState(()=>normTheme(ld("dos_theme_v1","og")));
  const [showThemeSheet, setShowThemeSheet] = useState(false);
  const [showBackupSheet, setShowBackupSheet] = useState(false);
  const themeMounted = useRef(false);
  useEffect(()=>{ applyTheme(theme, themeMounted.current); themeMounted.current = true; sv("dos_theme_v1",theme); },[theme]);

  // Auto-backup when stale (>7 days). iOS blocks downloads without a user
  // gesture, so there we open the sheet instead — one tap from "Back up now".
  useEffect(()=>{
    if (!apiKey) return;
    const meta = ld(BACKUP_META_KEY, null);
    if (meta && meta.lastBackup && Date.now() - meta.lastBackup < BACKUP_STALE_MS) return;
    const t = setTimeout(()=>{
      if (/iPhone|iPad|iPod/.test(navigator.userAgent)) setShowBackupSheet(true);
      else downloadBackup();
    }, 1500);
    return ()=>clearTimeout(t);
  },[]);

  useEffect(()=>{ const k=tdk(); setUsage(prev=>{const u={...prev,[k]:(prev[k]||0)+1};sv("dos_usage_v7",u);return u;}); },[]);
  useEffect(()=>{ sv("dos_meals_v7",meals); },[meals]);
  useEffect(()=>{ sv("dos_attend_v7",attend); },[attend]);
  useEffect(()=>{ sv("dos_favorites_v1",favorites); },[favorites]);
  useEffect(()=>{ sv("dos_supps_v1",supps); },[supps]);
  useEffect(()=>{ sv("dos_supp_checked_v1",suppChecked); },[suppChecked]);
  useEffect(()=>{ sv("dos_bw_log_v1",bwLog); },[bwLog]);
  useEffect(()=>{ sv("dos_habits_v1",habits); },[habits]);
  useEffect(()=>{ sv("dos_habit_checked_v1",habitChecked); },[habitChecked]);
  useEffect(()=>{ sv("dos_day_overrides_v1",dayOverrides); },[dayOverrides]);
  useEffect(()=>{ sv("dos_water_v1",water); },[water]);
  useEffect(()=>{ sv("dos_energy_v1",energy); },[energy]);
  useEffect(()=>{ sv("dos_prayer_checked_v1",prayerChecked); },[prayerChecked]);
  useEffect(()=>{ sv("dos_pr_v1",prLog); },[prLog]);

  // Track scroll for hero parallax (only on home page)
  useEffect(()=>{
    if (page !== "home") return;
    const el = document.getElementById("root");
    const handler = () => setScrollY(window.scrollY || document.documentElement.scrollTop);
    window.addEventListener("scroll", handler, {passive:true});
    return () => window.removeEventListener("scroll", handler);
  }, [page]);
  useEffect(()=>{ if(page!=="home") setScrollY(0); }, [page]);

  if (!apiKey) return <ApiKeyScreen onSave={setApiKey}/>;

  return (
    <div>
      {showBwModal&&<WeightLogModal bwLog={bwLog} setBwLog={setBwLog} onClose={()=>setShowBwModal(false)}/>}
      {showThemeSheet&&<ThemeSheet theme={theme} setTheme={setTheme} onClose={()=>setShowThemeSheet(false)}/>}
      {showBackupSheet&&<BackupSheet onClose={()=>setShowBackupSheet(false)}/>}
      {/* key=page triggers page-enter animation on every tab switch */}
      <div key={page} className="page-enter">
        {page==="home"        && <HomePage      meals={meals} usage={usage} supps={supps} suppChecked={suppChecked} setPage={setPage} scrollY={scrollY} bwLog={bwLog} setShowBwModal={setShowBwModal} setShowThemeSheet={setShowThemeSheet} setShowBackupSheet={setShowBackupSheet} water={water} setWater={setWater} energy={energy} setEnergy={setEnergy} prayerChecked={prayerChecked} setPrayerChecked={setPrayerChecked} dayOverrides={dayOverrides}/>}
        {page==="fitness"     && <FitnessPage   meals={meals} setMeals={setMeals} attend={attend} setAttend={setAttend} apiKey={apiKey} favorites={favorites} setFavorites={setFavorites} bwLog={bwLog} setBwLog={setBwLog} dayOverrides={dayOverrides} setDayOverrides={setDayOverrides} prLog={prLog} setPrLog={setPrLog}/>}
        {page==="habits"      && <HabitsPage    habits={habits} setHabits={setHabits} habitChecked={habitChecked} setHabitChecked={setHabitChecked}/>}
        {page==="supplements" && <SupplementsPage supps={supps} setSupps={setSupps} checked={suppChecked} setChecked={setSuppChecked}/>}
        {page==="progress"    && <ProgressPage bwLog={bwLog} setShowBackupSheet={setShowBackupSheet}/>}
      </div>
      <Nav page={page} setPage={setPage}/>
      <ToastHost/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
