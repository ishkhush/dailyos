<script>
(function(){
  function makeIcon(size) {
    try {
      var c = document.createElement('canvas');
      c.width = c.height = size;
      var ctx = c.getContext('2d');
      var r = size * 0.22;
      ctx.fillStyle = '#0a0a0c';
      ctx.beginPath();
      ctx.moveTo(r,0); ctx.lineTo(size-r,0); ctx.arcTo(size,0,size,r,r);
      ctx.lineTo(size,size-r); ctx.arcTo(size,size,size-r,size,r);
      ctx.lineTo(r,size); ctx.arcTo(0,size,0,size-r,r);
      ctx.lineTo(0,r); ctx.arcTo(0,0,r,0,r);
      ctx.closePath(); ctx.fill();
      var p = size*0.06, ir = size*0.14;
      ctx.fillStyle = '#131316';
      ctx.beginPath();
      ctx.moveTo(p+ir,p); ctx.lineTo(size-p-ir,p); ctx.arcTo(size-p,p,size-p,p+ir,ir);
      ctx.lineTo(size-p,size-p-ir); ctx.arcTo(size-p,size-p,size-p-ir,size-p,ir);
      ctx.lineTo(p+ir,size-p); ctx.arcTo(p,size-p,p,size-p-ir,ir);
      ctx.lineTo(p,p+ir); ctx.arcTo(p,p,p+ir,p,ir);
      ctx.closePath(); ctx.fill();
      var g = ctx.createLinearGradient(0,0,size,size);
      g.addColorStop(0,'#a78bfa'); g.addColorStop(1,'#60a5fa');
      ctx.fillStyle = g;
      ctx.font = '900 '+Math.round(size*0.5)+'px Arial,Helvetica,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText('D', size*0.44, size*0.68);
      ctx.fillStyle = '#6a6a7a';
      ctx.font = '700 '+Math.round(size*0.13)+'px Arial,Helvetica,sans-serif';
      ctx.fillText('OS', size*0.62, size*0.86);
      return c.toDataURL('image/png');
    } catch(e) { return ''; }
  }
  var icon192 = makeIcon(192), icon512 = makeIcon(512);
  if (icon192) { var al=document.createElement('link'); al.rel='apple-touch-icon'; al.href=icon192; document.head.appendChild(al); }
  var manifest = { name:'DailyOS', short_name:'DailyOS', description:'Fitness, nutrition & vocab', start_url:'./', scope:'./', display:'standalone', orientation:'portrait', background_color:'#0a0a0c', theme_color:'#a78bfa', icons:[{src:icon192,sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:icon512,sizes:'512x512',type:'image/png',purpose:'any maskable'}] };
  var ml=document.createElement('link'); ml.rel='manifest'; ml.href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(manifest)); document.head.appendChild(ml);
  if ('serviceWorker' in navigator) { window.addEventListener('load', function(){ navigator.serviceWorker.register('./sw.js').catch(function(){}); }); }
})();

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif}
html{background:#0a0a0c;-webkit-overflow-scrolling:touch;overflow-y:scroll}
body{background:#0a0a0c;color:#f0f0f2;min-height:100vh}
#root{max-width:430px;margin:0 auto;padding-bottom:96px;min-height:100vh}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit;transition:transform 0.12s,opacity 0.12s}
button:active:not(:disabled){transform:scale(0.95)}
input,textarea{font-family:inherit;outline:none;border:none}
video,img{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(167,139,250,0.3)}50%{box-shadow:0 0 22px rgba(167,139,250,0.7)}}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,0.6)}70%{box-shadow:0 0 0 12px rgba(248,113,113,0)}}
@keyframes shimmer{0%{background-position:-300px 0}100%{background-position:300px 0}}
@keyframes sweepRing{from{stroke-dashoffset:var(--ring-full)}to{stroke-dashoffset:var(--ring-offset)}}
@keyframes restDone{0%,100%{color:#ff6b6b;transform:scale(1)}50%{color:#fb923c;transform:scale(1.15)}}
@keyframes flashRest{0%{opacity:0;transform:translate(-50%,-50%) scale(0.7)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.05)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)}}
@keyframes heatPop{from{transform:scale(0.4);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes sparkleIn{from{opacity:0;transform:scaleY(0)}to{opacity:1;transform:scaleY(1)}}
@keyframes bwPulse{0%,100%{box-shadow:0 0 0 0 rgba(167,139,250,0.5)}50%{box-shadow:0 0 12px 4px rgba(167,139,250,0.2)}}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.12);border-top-color:#a78bfa;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px}
.fade-in{animation:fadeIn 0.28s cubic-bezier(0.34,1.56,0.64,1)}
.slide-up{animation:slideUp 0.32s cubic-bezier(0.34,1.56,0.64,1)}
.pop-in{animation:popIn 0.28s cubic-bezier(0.34,1.56,0.64,1)}
::-webkit-scrollbar{width:0;height:0}
</style>

function getDayInfo(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const dow = d.getDay();
  const diff = Math.round((d - GYM_ANCHOR) / 86400000);
  const isGym = ((diff % 2) + 2) % 2 === 0;
  const splitIdx = Math.floor(Math.abs(diff) / 2) % 2;
  const isKick = dow >= 1 && dow <= 4;
  const type = (isKick && isGym) ? "combo" : isKick ? "kb" : isGym ? "gym" : "rest";
  return { type, isKick, isGym, gymSplit: isGym ? GYM_SPLITS[splitIdx] : null };
}

// ── STORAGE ───────────────────────────────────────────────────────────────────
function dk(d) { const x = new Date(d); x.setHours(0,0,0,0); return x.toISOString().slice(0,10); }
const tdk = () => dk(new Date());
const vd = (o) => { const d = new Date(); d.setDate(d.getDate()+o); d.setHours(0,0,0,0); return d; };
const ld = (k, f) => { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : f; } catch { return f; } };
const sv = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };
const getQuote = () => { const d = new Date(); return QUOTES[(d.getFullYear()*366+d.getMonth()*31+d.getDate())%QUOTES.length]; };

function getTodayWords() {
  const d = new Date();
  const seed = d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
  const rand = s => { const x = Math.sin(s)*10000; return x - Math.floor(x); };
  const seen = new Set(), out = []; let i = 0;
  while (out.length < 3) {
    const idx = Math.floor(rand(seed+i) * WORDS.length);
    if (!seen.has(idx)) { seen.add(idx); out.push({...WORDS[idx], learned:false, videoUrl:null}); }
    i++;
  }
  return out;
}

// ── SPEECH ────────────────────────────────────────────────────────────────────
const speak = (t, r) => { if (!window.speechSynthesis) return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.rate = r||0.75; window.speechSynthesis.speak(u); };
function playSyllables(syls) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  let i = 0;
  const next = () => { if (i >= syls.length) return; const u = new SpeechSynthesisUtterance(syls[i]); u.rate = 0.55; u.onend = () => { i++; setTimeout(next, 320); }; window.speechSynthesis.speak(u); };
  next();
}

// ── ROBUST JSON EXTRACTOR ─────────────────────────────────────────────────────
function extractJSON(raw) {
  if (!raw) throw new Error("Empty response");
  try { return JSON.parse(raw); } catch {}
  const stripped = raw.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  try { return JSON.parse(stripped); } catch {}
  const match = stripped.match(/\{[\s\S]*\}/);
  if (match) try { return JSON.parse(match[0]); } catch {}
  throw new Error("Could not parse JSON from Claude response");
}

// ── CLAUDE API ────────────────────────────────────────────────────────────────
async function callClaude(apiKey, messages, system, maxTokens, model) {
  const body = { model: model || "claude-haiku-4-5-20251001", max_tokens: maxTokens || 1000, messages };
  if (system) body.system = system;
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-api-key":apiKey, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
    body: JSON.stringify(body)
  });
  if (!r.ok) { const err = await r.json().catch(()=>({})); throw new Error(err.error?.message || `API error ${r.status}`); }
  const data = await r.json();
  return data.content.filter(c=>c.type==="text").map(c=>c.text).join("");
}

async function analyzePhotoWithKey(apiKey, b64, mime) {
  const body = {
    model:"claude-sonnet-4-6", max_tokens:1000,
    messages:[{ role:"user", content:[
      { type:"image", source:{ type:"base64", media_type: mime||"image/jpeg", data:b64 } },
      { type:"text", text:'You are a precision nutrition AI. Identify every food item visible. Estimate portions carefully. Return ONLY valid JSON, no markdown:\n{"name":"full meal description","calories":number,"carbs":number,"protein":number,"fat":number,"fiber":number,"items":["item 1 - portion - ~Xcal"],"confidence":"high/medium/low","note":"brief note"}' }
    ]}]
  };
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-api-key":apiKey, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
    body: JSON.stringify(body)
  });
  if (!r.ok) { const e = await r.json().catch(()=>{}); throw new Error(e?.error?.message || "Photo analysis failed"); }
  const data = await r.json();
  return extractJSON(data.content.filter(c=>c.type==="text").map(c=>c.text).join(""));
}

// ── FOOD AI CHAT ──────────────────────────────────────────────────────────────
const FOOD_SYSTEM = `You are a precise nutrition assistant inside a fitness tracking app. Help log food with accurate nutrition data.

RULES:
- When user mentions food without quantity, ask briefly for portion/serving size
- Once you have food + quantity, provide nutrition data
- For branded foods (Raw Farms, Quest, Chipotle, etc.) use brand-specific data
- Always respond in EXACTLY one of these two JSON formats with NO extra text, NO markdown:

FORMAT 1 - Need more info:
{"type":"question","message":"your brief friendly question"}

FORMAT 2 - Ready to log:
{"type":"result","name":"Food name with exact portion","calories":number,"carbs":number,"protein":number,"fat":number,"fiber":number,"message":"brief confirmation"}

Output ONLY valid JSON. Nothing else.`;

function FoodAIChat({ apiKey, onAddMeal, onClose, favorites, onSaveFavorite }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [pendingResult, setPendingResult] = useState(null);
  const [photoScanning, setPhotoScanning] = useState(false);
  const fileRef = useRef();
  const bottomRef = useRef();

  useEffect(() => { bottomRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages, loading]);

  const sendMessage = async (text) => {
    if (!text.trim() || loading) return;
    const userMsg = {role:"user", content:text.trim()};
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput("");
    setLoading(true);
    setPendingResult(null);
    try {
      const raw = await callClaude(apiKey, newMessages.map(m=>({role:m.role,content:m.content})), FOOD_SYSTEM, 600, "claude-haiku-4-5-20251001");
      const parsed = extractJSON(raw);
      if (parsed.type==="question") {
        setMessages(prev=>[...prev,{role:"assistant",content:parsed.message,isQuestion:true}]);
      } else if (parsed.type==="result") {
        setMessages(prev=>[...prev,{role:"assistant",content:parsed.message,isResult:true,result:parsed}]);
        setPendingResult(parsed);
      } else {
        setMessages(prev=>[...prev,{role:"assistant",content:parsed.message||raw,isQuestion:true}]);
      }
    } catch(e) {
      setMessages(prev=>[...prev,{role:"assistant",content:"Try being specific — e.g. \"2 cups raw milk\" or \"1 Quest bar\".",isError:true}]);
    }
    setLoading(false);
  };

  const handlePhoto = (e) => {
    const f = e.target.files[0]; if (!f) return; e.target.value="";
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const b64 = ev.target.result.split(",")[1];
      setPhotoScanning(true); setPendingResult(null);
      try {
        const result = await analyzePhotoWithKey(apiKey, b64, f.type||"image/jpeg");
        const photoMsg = {
          role:"assistant",
          content:`📸 I can see: ${result.items?result.items.join(", "):result.name}\n\n• ${result.calories} cal  • ${result.carbs}g carbs  • ${result.protein}g protein  • ${result.fat}g fat${result.note?"\n\nNote: "+result.note:""}`,
          isResult:true, isPhoto:true,
          result:{name:result.name,calories:result.calories||0,carbs:result.carbs||0,protein:result.protein||0,fat:result.fat||0,fiber:result.fiber||0}
        };
        setMessages(prev=>[...prev,{role:"user",content:"📸 [Meal photo]"},photoMsg]);
        setPendingResult(photoMsg.result);
      } catch(err) {
        setMessages(prev=>[...prev,{role:"assistant",content:"Couldn't analyze that photo. Make sure food is clearly visible.",isError:true}]);
      }
      setPhotoScanning(false);
    };
    reader.readAsDataURL(f);
  };

  const confirmAdd = () => {
    if (!pendingResult) return;
    onAddMeal({name:pendingResult.name,cal:pendingResult.calories||0,carb:pendingResult.carbs||0,prot:pendingResult.protein||0,fat:pendingResult.fat||0,fiber:pendingResult.fiber||0});
    setPendingResult(null);
    setMessages(prev=>[...prev,{role:"assistant",content:"✅ Added to your log! What else did you eat?",isConfirm:true}]);
  };

  const quickAddFavorite = (fav) => {
    onAddMeal({name:fav.name,cal:fav.cal,carb:fav.carb,prot:fav.prot,fat:fav.fat,fiber:fav.fiber||0});
    setMessages(prev=>[...prev,{role:"assistant",content:`✅ Added "${fav.name}" (${fav.cal} cal) from favorites!`,isConfirm:true}]);
  };

  return (
    <div style={{position:"fixed",inset:0,background:C.bg,zIndex:200,display:"flex",flexDirection:"column",maxWidth:430,margin:"0 auto"}}>
      {/* Header */}
      <div style={{padding:"52px 20px 16px",background:C.bg2,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:18,fontWeight:800}}>AI Food Logger</div>
            <div style={{fontSize:12,color:C.text2,marginTop:2}}>Powered by Claude · Type food or scan a photo</div>
          </div>
          <button onClick={onClose} style={{width:34,height:34,borderRadius:"50%",background:C.bg3,border:`1px solid ${C.border}`,color:C.text2,fontSize:20}}>×</button>
        </div>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 16px 0"}}>

        {/* Favorites quick-add (shown when no messages yet) */}
        {messages.length===0 && favorites.length>0 && (
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,color:C.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:0.7,marginBottom:8}}>⭐ Favorites</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {favorites.map((fav,i)=>(
                <button key={i} onClick={()=>quickAddFavorite(fav)} style={{background:C.bg2,border:`1px solid ${C.border2}`,borderRadius:12,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontSize:13,color:C.text,fontWeight:600}}>{fav.name}</div>
                    <div style={{fontSize:11,color:C.text3,marginTop:2}}>
                      {fav.cal} cal · {fav.prot}g P · {fav.carb}g C · {fav.fat}g F
                    </div>
                  </div>
                  <div style={{fontSize:18,color:C.green,marginLeft:8}}>+</div>
                </button>
              ))}
            </div>
            <div style={{height:1,background:C.border,margin:"12px 0"}}></div>
          </div>
        )}

        {/* Starter suggestions */}
        {messages.length===0 && (
          <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:18,padding:16,marginBottom:12,maxWidth:"85%"}}>
            <div style={{fontSize:14,color:C.text,lineHeight:1.65}}>Hey Ish! 👋 Tell me what you ate:</div>
            <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:6}}>
              {["2 cups Raw Farms raw milk","2 eggs with avocado toast","Chipotle chicken bowl","1 Quest protein bar"].map(s=>(
                <button key={s} onClick={()=>sendMessage(s)} style={{background:C.bg3,border:`1px solid ${C.border2}`,borderRadius:10,padding:"8px 12px",fontSize:13,color:C.accent,textAlign:"left"}}>{s} →</button>
              ))}
            </div>
          </div>
        )}

        {messages.map((m,i)=>(
          <div key={i} className="fade-in" style={{display:"flex",flexDirection:"column",alignItems:m.role==="user"?"flex-end":"flex-start",marginBottom:10}}>
            {m.role==="user" ? (
              <div style={{background:C.accent,borderRadius:"18px 18px 4px 18px",padding:"10px 14px",maxWidth:"80%",fontSize:14,color:"white"}}>{m.content}</div>
            ) : (
              <div style={{maxWidth:"90%",width:m.isResult?"90%":undefined}}>
                <div style={{background:m.isResult?"rgba(52,211,153,0.08)":m.isError?"rgba(248,113,113,0.08)":m.isConfirm?"rgba(52,211,153,0.08)":C.bg2,border:`1px solid ${m.isResult?"rgba(52,211,153,0.2)":m.isError?"rgba(248,113,113,0.2)":m.isConfirm?"rgba(52,211,153,0.2)":C.border}`,borderRadius:"4px 18px 18px 18px",padding:"12px 14px"}}>
                  <div style={{fontSize:14,color:C.text,lineHeight:1.65,whiteSpace:"pre-wrap"}}>{m.content}</div>
                  {m.isResult&&m.result&&!m.isConfirm&&(
                    <div style={{marginTop:10}}>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
                        {[["Cal",m.result.calories,C.accent],["Carbs",(m.result.carbs||0)+"g",C.green],["Prot",(m.result.protein||0)+"g",C.blue],["Fat",(m.result.fat||0)+"g",C.amber]].map(x=>(
                          <div key={x[0]} style={{background:C.bg4,borderRadius:8,padding:"5px 10px"}}>
                            <div style={{fontSize:9,color:C.text3}}>{x[0]}</div>
                            <div style={{fontSize:14,fontWeight:800,color:x[2]}}>{x[1]}</div>
                          </div>
                        ))}
                      </div>
                      {/* Save to favorites button */}
                      {onSaveFavorite && (
                        <button onClick={()=>onSaveFavorite(m.result)} style={{fontSize:12,color:C.amber,border:`1px solid rgba(251,191,36,0.25)`,background:"rgba(251,191,36,0.08)",borderRadius:8,padding:"5px 12px"}}>
                          ⭐ Save as Favorite
                        </button>
                      )}
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        ))}

        {(loading||photoScanning) && (
          <div style={{display:"flex",alignItems:"flex-start",marginBottom:10}}>
            <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:"4px 18px 18px 18px",padding:"12px 14px"}}>
              <span className="spin"></span><span style={{fontSize:13,color:C.text2}}>{photoScanning?"Analyzing meal photo…":"Looking up nutrition…"}</span>
            </div>

        )}

// ── WEEKLY HISTORY BAR CHART ──────────────────────────────────────────────────
function WeeklyHistory({ meals }) {
  const days = [];
  for (let i=6; i>=0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0);
    const key = dk(d);
    const cal = Math.round((meals[key]||[]).reduce((a,m)=>a+(m.cal||0),0));
    const tgt = TARGETS[getDayInfo(d).type].cal;
    days.push({d, cal, tgt, isToday:i===0});
  }
  const maxCal = Math.max(...days.map(d=>d.cal), 1000);
  return (
    <div style={{margin:"0 16px 16px"}}>
      <div style={{fontSize:10,color:C.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:0.7,marginBottom:10}}>This Week</div>
      <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:16,padding:"14px 12px"}}>
        <div style={{display:"flex",gap:4,alignItems:"flex-end",height:70}}>
          {days.map((day,i)=>{
            const barH = day.cal > 0 ? Math.max(4, Math.round((day.cal/maxCal)*54)) : 0;
            const hit = day.cal >= day.tgt * 0.9;
            const barColor = day.isToday ? C.accent : day.cal===0 ? C.bg4 : hit ? C.green : C.amber;
            return (
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <div style={{fontSize:8,color:day.cal>0?(hit?C.green:C.amber):C.text3,fontWeight:700,minHeight:10}}>
                  {day.cal>0?(day.cal>=1000?Math.round(day.cal/100)/10+"k":day.cal):""}
                </div>
                <div style={{width:"100%",height:54,background:C.bg4,borderRadius:4,overflow:"hidden",display:"flex",alignItems:"flex-end"}}>
                  <div style={{width:"100%",height:barH+"px",background:barColor,borderRadius:4,transition:"height 0.4s"}}/>
                </div>
                <div style={{fontSize:8,color:day.isToday?C.accent:C.text3,fontWeight:day.isToday?700:400}}>
                  {DAYS_S[day.d.getDay()]}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:12,marginTop:10}}>
          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:C.green}}/><span style={{fontSize:10,color:C.text3}}>On target</span></div>
          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:C.amber}}/><span style={{fontSize:10,color:C.text3}}>Under target</span></div>
          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:C.accent}}/><span style={{fontSize:10,color:C.text3}}>Today</span></div>
        </div>
      </div>
    </div>
  );
}

    return (
      <div onClick={onClick} style={{margin:"16px 16px 0",background:C.bg2,border:`1px solid ${C.border}`,borderRadius:16,padding:"14px 16px",cursor:"pointer"}}>
        <div style={{fontSize:10,color:C.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>⚖️ Body Weight</div>
        <div style={{fontSize:13,color:C.text3,textAlign:"center",padding:"8px 0"}}>Tap to start logging your weight</div>
      </div>
    );
  }
  const weights = last7.map(e => e.weight);
  const minW = Math.min(...weights);
  const maxW = Math.max(...weights);
  const range = maxW - minW || 1;
  const W = 260, H = 52, pad = 6;
  const pts = weights.map((w, i) => {
    const x = pad + (i / Math.max(weights.length - 1, 1)) * (W - pad * 2);
    const y = H - pad - ((w - minW) / range) * (H - pad * 2);
    return [x, y];
  });
  const polyline = pts.map(p => p.join(",")).join(" ");
  const latest = weights[weights.length - 1];
  const first = weights[0];
  const delta = latest - first;
  const deltaStr = delta === 0 ? "=" : (delta > 0 ? "+" : "") + delta.toFixed(1);
  const deltaColor = delta > 0 ? C.green : delta < 0 ? C.red : C.text3;

  // Area fill path
  const areaPath = `M ${pts[0][0]},${H} ` + pts.map(p => `L ${p[0]},${p[1]}`).join(" ") + ` L ${pts[pts.length-1][0]},${H} Z`;

  return (
    <div onClick={onClick} style={{margin:"16px 16px 0",background:C.bg2,border:`1px solid ${C.border}`,borderRadius:16,padding:"14px 16px",cursor:"pointer"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:10,color:C.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>⚖️ Body Weight</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,color:deltaColor,fontWeight:700}}>{deltaStr} lbs</span>
          <span style={{fontSize:15,fontWeight:800,color:C.accent}}>{latest} lbs</span>
        </div>
      </div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible",animation:"sparkleIn 0.5s ease forwards"}}>
        <defs>
          <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#a78bfa" stopOpacity="0.35"/>
            <stop offset="100%" stopColor="#a78bfa" stopOpacity="0.02"/>
          </linearGradient>
          <filter id="sparkGlow">
            <feGaussianBlur stdDeviation="1.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <path d={areaPath} fill="url(#sparkGrad)"/>
        <polyline points={polyline} fill="none" stroke="#a78bfa" strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round" filter="url(#sparkGlow)"/>
        {pts.map((p, i) => (
          <circle key={i} cx={p[0]} cy={p[1]} r={i === pts.length - 1 ? 4 : 2.5}
            fill={i === pts.length - 1 ? "#a78bfa" : "rgba(167,139,250,0.5)"}
            style={{animation:`bwPulse 2s ease infinite ${i===pts.length-1?"":`${i*0.1}s`}`}}/>
        ))}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
        <span style={{fontSize:9,color:C.text3}}>{last7[0]?.date}</span>
        <span style={{fontSize:9,color:C.text3}}>today</span>
      </div>
    </div>
  );
}

// ── CALORIE RING (Apple Watch style) ─────────────────────────────────────────
function CalorieRing({ consumed, target }) {
  const pct = Math.min(1, consumed / target);
  const SIZE = 120, STROKE = 11, R = (SIZE - STROKE) / 2;
  const CIRC = 2 * Math.PI * R;
  const offset = CIRC * (1 - pct);
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <svg width={SIZE} height={SIZE} style={{transform:"rotate(-90deg)"}}>
        <defs>
          <linearGradient id="calRingGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#a78bfa"/>
            <stop offset="100%" stopColor="#f472b6"/>
          </linearGradient>
          <filter id="ringGlow">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        {/* Track */}
        <circle cx={SIZE/2} cy={SIZE/2} r={R} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={STROKE}/>
        {/* Progress arc */}
        <circle cx={SIZE/2} cy={SIZE/2} r={R} fill="none"
          stroke="url(#calRingGrad)"
          strokeWidth={STROKE}
          strokeLinecap="round"
          strokeDasharray={CIRC}
          strokeDashoffset={offset}
          filter="url(#ringGlow)"
          style={{
            "--ring-full": CIRC,
            "--ring-offset": offset,
            animation: "sweepRing 1s cubic-bezier(0.34,1.2,0.64,1) forwards"
          }}
        />
      </svg>
      <div style={{position:"absolute",display:"flex",flexDirection:"column",alignItems:"center",pointerEvents:"none"}}>
        <div style={{fontSize:18,fontWeight:900,color:C.text,lineHeight:1}}>{Math.round(consumed)}</div>
        <div style={{fontSize:9,color:C.text3,fontWeight:700,letterSpacing:0.5,marginTop:1}}>/ {target}</div>
        <div style={{fontSize:8,color:"#f472b6",fontWeight:800,letterSpacing:1,textTransform:"uppercase",marginTop:2}}>kcal</div>
      </div>
    </div>
  );
}

// ── GYM HEATMAP ───────────────────────────────────────────────────────────────
function GymHeatmap({ attend }) {
  const today = new Date(); today.setHours(0,0,0,0);
  // Build 4 weeks = 28 days, starting from 27 days ago up to today
  const cells = [];
  for (let i = 27; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const key = dk(d);
    const att = attend[key] || {};
    const didGym = att.gym;
    const didKb = att.kb;
    const isToday = i === 0;
    const info = getDayInfo(d);
    const wasWorkoutDay = info.isGym || info.isKick;
    cells.push({ d, key, didGym, didKb, isToday, wasWorkoutDay, dow: d.getDay() });
  }
  // group into weeks (rows)
  const weeks = [];
  for (let i = 0; i < 4; i++) weeks.push(cells.slice(i * 7, i * 7 + 7));

  const getCellStyle = (cell) => {
    if (cell.didGym && cell.didKb) return { bg: "#a78bfa", glow: "0 0 8px rgba(167,139,250,0.7)", opacity: 1 };
    if (cell.didGym) return { bg: "#fbbf24", glow: "0 0 6px rgba(251,191,36,0.5)", opacity: 1 };
    if (cell.didKb) return { bg: "#2fe5a5", glow: "0 0 6px rgba(47,229,165,0.5)", opacity: 1 };
    if (!cell.wasWorkoutDay) return { bg: "#1e1e2e", glow: "none", opacity: 0.6 }; // rest day
    return { bg: "#181823", glow: "none", opacity: 1 }; // missed workout day
  };

  return (
    <div style={{margin:"12px 16px 0",background:C.bg2,border:`1px solid ${C.border}`,borderRadius:16,padding:"14px 16px"}}>
      <div style={{fontSize:10,color:C.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>📅 Last 4 Weeks</div>
      {/* Day labels */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
        {["S","M","T","W","T","F","S"].map((d,i)=>(
          <div key={i} style={{fontSize:8,color:C.text3,textAlign:"center",fontWeight:700}}>{d}</div>
        ))}
      </div>
      {weeks.map((week, wi) => (
        <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
          {week.map((cell, ci) => {
            const cs = getCellStyle(cell);
            return (
              <div key={ci} title={`${cell.d.toLocaleDateString()}
${cell.didGym?"Gym ":""}${cell.didKb?"KB":""}`}
                style={{
                  aspectRatio:"1",
                  borderRadius:4,
                  background:cs.bg,
                  boxShadow:cell.isToday?`0 0 0 2px #a78bfa, ${cs.glow}`:cs.glow,
                  opacity:cs.opacity,
                  animation:cell.didGym||cell.didKb?`heatPop 0.3s ${wi*0.05+ci*0.02}s both`:undefined,
                  transition:"background 0.3s"
                }}/>
            );
          })}
        </div>
      ))}
      {/* Legend */}
      <div style={{display:"flex",gap:10,marginTop:10,flexWrap:"wrap"}}>
        {[[C.accent,"Gym + KB"],["#fbbf24","Gym"],["#2fe5a5","Kickboxing"],["#181823","Missed"]].map(([c,l])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:8,height:8,borderRadius:2,background:c}}/>
            <span style={{fontSize:9,color:C.text3}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── REST TIMER ────────────────────────────────────────────────────────────────
function RestTimer() {
  const DURATION = 90;
  const [active, setActive] = useState(false);
  const [timeLeft, setTimeLeft] = useState(DURATION);
  const [done, setDone] = useState(false);
  const intervalRef = useRef(null);

  useEffect(() => {
    if (active && timeLeft > 0) {
      intervalRef.current = setInterval(() => {
        setTimeLeft(t => {
          if (t <= 1) {
            clearInterval(intervalRef.current);
            setActive(false);
            setDone(true);
            return 0;
          }
          return t - 1;
        });
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [active]);

  const handleTap = () => {
    if (!active && timeLeft === DURATION && !done) {
      setActive(true); setDone(false);
    } else {
      // reset
      clearInterval(intervalRef.current);
      setActive(false); setTimeLeft(DURATION); setDone(false);
    }
  };

  const SIZE = 70, STROKE = 5, R = (SIZE - STROKE) / 2;
  const CIRC = 2 * Math.PI * R;
  const pct = timeLeft / DURATION;
  const offset = CIRC * (1 - pct);

  return (
    <div style={{position:"fixed",bottom:"calc(90px + env(safe-area-inset-bottom))",right:16,zIndex:90}}>
      {/* REST DONE flash */}
      {done && (
        <div style={{
          position:"absolute",
          top:"50%",left:"50%",
          transform:"translate(-50%,-50%)",
          background:"rgba(251,146,60,0.95)",
          borderRadius:12,
          padding:"6px 12px",
          fontSize:10,
          fontWeight:900,
          color:"white",
          letterSpacing:1,
          whiteSpace:"nowrap",
          pointerEvents:"none",
          animation:"flashRest 2.5s forwards",
          zIndex:200,
        }}>REST DONE ✓</div>
      )}
      <button onClick={handleTap} style={{
        width:SIZE,height:SIZE,
        borderRadius:"50%",
        background:"rgba(10,10,20,0.9)",
        border:`1px solid ${active?"rgba(167,139,250,0.4)":"rgba(255,255,255,0.1)"}`,
        backdropFilter:"blur(12px)",
        WebkitBackdropFilter:"blur(12px)",
        display:"flex",alignItems:"center",justifyContent:"center",
        boxShadow:active?"0 4px 20px rgba(167,139,250,0.25)":"0 2px 12px rgba(0,0,0,0.5)",
        position:"relative",
        overflow:"visible",
        transition:"box-shadow 0.3s,border 0.3s",
        animation:done?"restDone 0.4s ease":undefined,
      }}>
        <svg width={SIZE} height={SIZE} style={{position:"absolute",top:0,left:0,transform:"rotate(-90deg)"}}>
          <circle cx={SIZE/2} cy={SIZE/2} r={R} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth={STROKE}/>
          {active && (
            <circle cx={SIZE/2} cy={SIZE/2} r={R} fill="none"
              stroke={done?"#fb923c":"#a78bfa"}
              strokeWidth={STROKE}
              strokeLinecap="round"
              strokeDasharray={CIRC}
              strokeDashoffset={offset}
              style={{transition:"stroke-dashoffset 1s linear"}}
            />
          )}
        </svg>
        <div style={{position:"relative",zIndex:1,textAlign:"center",lineHeight:1}}>
          {done ? (
            <div style={{fontSize:14,color:"#fb923c",fontWeight:900,animation:"restDone 0.6s ease infinite"}}>✓</div>
          ) : active ? (
            <div style={{fontSize:14,fontWeight:900,color:timeLeft<=10?C.red:C.accent}}>{timeLeft}</div>
          ) : (
            <div style={{fontSize:20}}>⏱</div>
          )}
          <div style={{fontSize:7,color:C.text3,fontWeight:700,marginTop:2}}>{active?"REST":"TIMER"}</div>
        </div>
      </button>
    </div>
  );
}

// ── WEIGHT LOG MODAL ──────────────────────────────────────────────────────────
function WeightLogModal({ bwLog, setBwLog, onClose }) {
  const [inputVal, setInputVal] = useState("");
  const [saved, setSaved] = useState(false);

  const handleSave = () => {
    const w = parseFloat(inputVal);
    if (!w || w < 50 || w > 400) return;
    const today = tdk();
    const newLog = bwLog.filter(e => e.date !== today);
    newLog.push({ date: today, weight: w });
    newLog.sort((a, b) => a.date.localeCompare(b.date));
    setBwLog(newLog);
    setSaved(true);
    setTimeout(onClose, 800);
  };

  const last5 = [...bwLog].slice(-5).reverse();

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:250,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="slide-up" style={{background:C.bg2,border:`1px solid ${C.border2}`,borderRadius:"24px 24px 0 0",padding:"24px 20px calc(24px + env(safe-area-inset-bottom))",width:"100%",maxWidth:430}}>
        <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>⚖️ Log Weight</div>
        <div style={{fontSize:12,color:C.text2,marginBottom:20}}>Goal: {PROFILE.currentWeight} → {PROFILE.goalWeight} lbs (lean bulk)</div>
        <div style={{display:"flex",gap:10,marginBottom:20}}>
          <input
            type="number" step="0.1" min="80" max="400"
            placeholder={`e.g. ${PROFILE.currentWeight}`}
            value={inputVal}
            onChange={e=>setInputVal(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&handleSave()}
            style={{flex:1,background:C.bg3,border:`1px solid ${C.border2}`,borderRadius:14,padding:"14px 16px",fontSize:18,fontWeight:700,color:C.text}}
            autoFocus
          />
          <button onClick={handleSave} style={{background:saved?C.green:C.accent,border:"none",borderRadius:14,padding:"14px 20px",fontSize:15,fontWeight:800,color:"white",minWidth:80,transition:"background 0.3s"}}>
            {saved?"✓ Saved":"Save"}
          </button>
        </div>
        {last5.length > 0 && (
          <div>
            <div style={{fontSize:10,color:C.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Recent Entries</div>
            {last5.map((e,i) => (
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontSize:13,color:C.text2}}>{e.date}</span>
                <span style={{fontSize:13,fontWeight:700,color:C.accent}}>{e.weight} lbs</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── VOCAB PAGE ────────────────────────────────────────────────────────────────
function VocabPage({ vocab, setVocab, learned, setLearned }) {
  const [vtab, setVtab] = useState("today");
  const [recState, setRecState] = useState("idle");
  const [recIdx, setRecIdx] = useState(null);
  const [prevVid, setPrevVid] = useState(null);
  const [prevIdx, setPrevIdx] = useState(null);
  const [vidError, setVidError] = useState("");
  const mrRef = useRef();
  const chunksRef = useRef([]);
  const streamRef = useRef(null);
  const liveVideoRef = useRef(null);

  useEffect(()=>{ return ()=>{ if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop()); }; },[]);

  const markLearned = (i) => {
    const w = vocab[i]; const nl = !w.learned;
    setVocab(prev=>prev.map((x,j)=>j===i?{...x,learned:nl}:x));
    if(nl) { setLearned(prev=>prev.find(l=>l.word===w.word)?prev:[{word:w.word,pos:w.pos,definition:w.definition,date:tdk(),videoUrl:w.videoUrl||null},...prev]); }
    else { setLearned(prev=>prev.filter(l=>l.word!==w.word)); }
  };

  const startRec = async (i) => {
    setVidError("");
    if (!navigator.mediaDevices?.getUserMedia) { setVidError("Camera not available. Open via HTTPS or localhost."); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"},audio:true});
      streamRef.current = stream; chunksRef.current = [];
      // Attach live preview
      if (liveVideoRef.current) { liveVideoRef.current.srcObject = stream; liveVideoRef.current.play().catch(()=>{}); }
      const mimeTypes = ["video/webm;codecs=vp9,opus","video/webm;codecs=vp8,opus","video/webm","video/mp4"];
      const supported = mimeTypes.find(t=>MediaRecorder.isTypeSupported(t))||"";
      const mr = new MediaRecorder(stream, supported?{mimeType:supported}:{});
      mr.ondataavailable = e=>{ if(e.data&&e.data.size>0) chunksRef.current.push(e.data); };
      mr.onstop = ()=>{
        const blob = new Blob(chunksRef.current,{type:mr.mimeType||"video/webm"});
        setPrevVid(URL.createObjectURL(blob)); setPrevIdx(i); setRecState("preview");
        stream.getTracks().forEach(t=>t.stop()); streamRef.current=null;
        if (liveVideoRef.current) { liveVideoRef.current.srcObject = null; }
      };
      mrRef.current=mr; mr.start(200); setRecIdx(i); setRecState("recording");
    } catch(err) {
      setVidError(err.name==="NotAllowedError"?"Camera permission denied.":err.name==="NotFoundError"?"No camera found.":"Camera error: "+err.message);
    }
  };

  const stopRec = ()=>{ if(mrRef.current&&recState==="recording") mrRef.current.stop(); };

  const saveVid = async ()=>{
    if(!prevVid||prevIdx===null) return;
    setRecState("saving");
    try {
      const resp = await fetch(prevVid); const blob = await resp.blob();
      const reader = new FileReader();
      reader.onload = ()=>{
        const dataUrl = reader.result;
        const w = vocab[prevIdx];
        setVocab(prev=>prev.map((x,i)=>i===prevIdx?{...x,videoUrl:dataUrl}:x));
        setLearned(prev=>{ const ex=prev.find(l=>l.word===w.word); if(ex) return prev.map(l=>l.word===w.word?{...l,videoUrl:dataUrl}:l); return [{word:w.word,pos:w.pos,definition:w.definition,date:tdk(),videoUrl:dataUrl},...prev]; });
        URL.revokeObjectURL(prevVid);
        setPrevVid(null); setPrevIdx(null); setRecState("idle"); setRecIdx(null);
      };
      reader.onerror=()=>{ setVidError("Failed to save. Try a shorter recording."); setRecState("preview"); };
      reader.readAsDataURL(blob);
    } catch(err){ setVidError("Save failed: "+err.message); setRecState("preview"); }
  };

  const discardVid = ()=>{ if(prevVid) URL.revokeObjectURL(prevVid); setPrevVid(null); setPrevIdx(null); setRecState("idle"); setRecIdx(null); };

  return (
    <div>
      {/* ── LIVE CAMERA OVERLAY (while recording) ── */}
      {recState==="recording"&&(
        <div style={{position:"fixed",inset:0,background:"#000",zIndex:300,display:"flex",flexDirection:"column"}} className="pop-in">
          <video ref={liveVideoRef} autoPlay muted playsInline style={{flex:1,width:"100%",objectFit:"cover",transform:"scaleX(-1)"}}/>
          {/* Overlay UI */}
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",justifyContent:"space-between",pointerEvents:"none"}}>
            {/* Top bar */}
            <div style={{padding:"54px 20px 0",display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:12,height:12,borderRadius:"50%",background:C.red,animation:"recPulse 1.2s ease infinite",boxShadow:`0 0 0 0 ${C.red}`}}/>
              <span style={{color:"white",fontSize:13,fontWeight:700,letterSpacing:0.3,textShadow:"0 1px 6px rgba(0,0,0,0.8)"}}>Recording</span>
            </div>
            {/* Word prompt */}
            <div style={{margin:"0 20px 30px",background:"rgba(0,0,0,0.72)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:20,padding:"18px 20px",pointerEvents:"all"}}>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Use this word in a sentence</div>
              <div style={{fontFamily:"Georgia,serif",fontSize:28,color:"white",fontWeight:400,marginBottom:14}}>{vocab[recIdx]?.word}</div>
              <button onClick={stopRec} style={{width:"100%",background:C.red,border:"none",borderRadius:14,padding:"16px 0",fontSize:16,fontWeight:800,color:"white",boxShadow:`0 4px 20px rgba(255,107,107,0.5)`,animation:"glow 2s ease infinite"}}>
                ■  Stop Recording
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── PREVIEW / SAVE MODAL ── */}
      {(recState==="preview"||recState==="saving")&&prevVid&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.94)",zIndex:300,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}} className="pop-in">
          <div style={{background:C.bg2,border:`1px solid rgba(179,157,250,0.25)`,borderRadius:24,padding:20,width:"100%",maxWidth:380,boxShadow:"0 24px 60px rgba(0,0,0,0.6)"}}>
            <div style={{fontSize:16,fontWeight:800,marginBottom:14,textAlign:"center",color:C.text}}>
              {recState==="saving"?"⏳ Saving…":"🎬 Review Recording"}
            </div>
            <video key={prevVid} src={prevVid} controls style={{width:"100%",borderRadius:14,marginBottom:14,background:"#000"}}/>
            {vidError&&<div style={{fontSize:12,color:C.red,marginBottom:10,textAlign:"center"}}>{vidError}</div>}
            {recState!=="saving"&&(
              <div style={{display:"flex",gap:10}}>
                <button onClick={saveVid} style={{flex:1,background:`linear-gradient(135deg,rgba(47,229,165,0.25),rgba(47,229,165,0.1))`,border:"1px solid rgba(47,229,165,0.4)",borderRadius:14,padding:"14px 0",color:C.green,fontWeight:800,fontSize:15}}>✓ Save</button>
                <button onClick={discardVid} style={{flex:1,background:C.bg3,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px 0",color:C.text2,fontSize:15}}>Re-try</button>
              </div>
            )}
            {recState==="saving"&&<div style={{textAlign:"center",padding:"6px 0"}}><span className="spin"></span><span style={{fontSize:13,color:C.text2}}>Saving video…</span></div>}
          </div>
        </div>
      )}

      <div style={{padding:"52px 20px 16px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-30,right:-10,width:140,height:140,borderRadius:"50%",background:"radial-gradient(circle,rgba(244,114,182,0.12) 0%,transparent 70%)",pointerEvents:"none"}}/>
        <div style={{fontSize:32,fontWeight:900,letterSpacing:-1,background:`linear-gradient(90deg,${C.text},${C.pink})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>Vocabulary</div>
        <div style={{fontSize:13,color:C.text2,marginTop:4}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
      </div>

      <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,margin:"0 16px 16px"}}>
        {["today","learned"].map(t=>(
          <button key={t} onClick={()=>setVtab(t)} style={{borderBottom:`2px solid ${vtab===t?C.accent:"transparent"}`,padding:"10px 20px",fontSize:13,fontWeight:700,color:vtab===t?C.accent:C.text3,marginBottom:-1}}>
            {t==="today"?"Today's Words":"Learned"}
            {t==="learned"&&learned.length>0&&<span style={{background:"rgba(167,139,250,0.15)",color:C.accent,borderRadius:10,padding:"1px 7px",fontSize:10,marginLeft:5}}>{learned.length}</span>}
          </button>
        ))}
      </div>

      {vidError&&recState==="idle"&&<div style={{margin:"0 16px 12px",background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.25)",borderRadius:12,padding:"10px 14px",fontSize:13,color:C.red}}>⚠️ {vidError}</div>}

      {vtab==="today"&&(
        <div style={{padding:"0 16px"}}>
          {vocab.map((w,i)=>{
            const wordColors=[[C.accent,"rgba(179,157,250,0.12)","rgba(179,157,250,0.2)"],[C.pink,"rgba(244,114,182,0.1)","rgba(244,114,182,0.2)"],[C.teal,"rgba(45,212,191,0.1)","rgba(45,212,191,0.18)"]];
            const [wc,wbg,wbdr]=wordColors[i%3];
            return(
            <div key={w.word} className="slide-up" style={{background:w.learned?C.bg3:`linear-gradient(145deg,${C.bg2},${C.bg3})`,border:`1px solid ${w.learned?C.border:wbdr}`,borderRadius:22,padding:20,marginBottom:16,opacity:w.learned?0.45:1,transition:"opacity 0.3s",boxShadow:w.learned?undefined:`0 4px 24px ${wbg}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div>
                  <div style={{fontFamily:"Georgia,serif",fontSize:26,fontWeight:400,color:C.text,letterSpacing:-0.3}}>{w.word}</div>
                  <span style={{display:"inline-block",fontSize:10,fontWeight:800,color:wc,background:wbg,border:`1px solid ${wbdr}`,borderRadius:20,padding:"3px 12px",marginTop:5,letterSpacing:0.3}}>{w.pos}</span>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>playSyllables(w.syllables)} style={{width:34,height:34,borderRadius:"50%",background:C.bg4,border:`1px solid ${C.border2}`,color:C.text2,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>▶</button>
                  <button onClick={()=>speak(w.word,0.8)} style={{width:34,height:34,borderRadius:"50%",background:C.bg4,border:`1px solid ${C.border2}`,color:C.text2,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>🔊</button>
                  <button onClick={()=>markLearned(i)} style={{width:34,height:34,borderRadius:"50%",background:w.learned?"rgba(47,229,165,0.18)":C.bg4,border:`1px solid ${w.learned?"rgba(47,229,165,0.4)":C.border2}`,color:w.learned?C.green:C.text2,fontSize:14,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:w.learned?`0 0 10px rgba(47,229,165,0.3)`:undefined}}>✓</button>
                </div>
              </div>
              <button onClick={()=>playSyllables(w.syllables)} style={{display:"flex",alignItems:"center",gap:6,border:`1px solid ${wbdr}`,background:wbg,borderRadius:20,padding:"5px 14px",color:wc,fontSize:11,fontWeight:700,marginBottom:12}}>▶ Syllable by syllable</button>
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:14}}>
                {w.syllables.map((s,si)=>(
                  <span key={si} style={{display:"flex",alignItems:"center",gap:6}}>
                    <span onClick={()=>speak(s,0.6)} style={{background:C.bg4,border:`1px solid ${C.border2}`,color:wc,fontSize:13,padding:"5px 12px",borderRadius:20,cursor:"pointer",fontWeight:600}}>{s}</span>
                    {si<w.syllables.length-1&&<span style={{color:C.text3,fontSize:14}}>·</span>}
                  </span>
                ))}
              </div>
              <div style={{fontSize:14,color:C.text,lineHeight:1.7,marginBottom:10}}>{w.definition}</div>
              <div style={{fontSize:13,color:C.text2,fontStyle:"italic",lineHeight:1.6,paddingLeft:14,borderLeft:`2px solid ${wbdr}`,marginBottom:16}}>"{w.example}"</div>
              {w.videoUrl?(
                <div>
                  <div style={{fontSize:11,color:C.green,fontWeight:600,marginBottom:6}}>📹 Your recorded sentence</div>
                  <video key={w.videoUrl} src={w.videoUrl} controls style={{width:"100%",borderRadius:12,marginBottom:10,background:"#000",maxHeight:200}}/>
                  <button onClick={()=>startRec(i)} style={{fontSize:12,color:C.text2,border:`1px solid ${C.border2}`,borderRadius:10,padding:"7px 14px",background:C.bg3}}>🔄 Re-record</button>
                </div>
              ):(
                <button onClick={()=>startRec(i)} disabled={recState==="recording"} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:`linear-gradient(135deg,rgba(179,157,250,0.12),rgba(91,188,255,0.06))`,border:"1px solid rgba(179,157,250,0.25)",borderRadius:14,padding:"13px 14px",color:C.accent,fontSize:14,fontWeight:700,width:"100%",opacity:recState==="recording"?0.3:1,boxShadow:"0 2px 12px rgba(179,157,250,0.08)"}}>
                  📹 Record yourself using this word
                </button>
              )}
            </div>
          );})}
        </div>
      )}

      {vtab==="learned"&&(
        <div style={{padding:"0 16px"}}>
          {learned.length===0?(
            <div style={{textAlign:"center",padding:"3rem 0",color:C.text3,fontSize:14}}>
              <div style={{fontSize:32,marginBottom:8}}>📚</div>
              Mark words as learned to archive them here.
            </div>
          ):learned.map((w,i)=>(
            <div key={i} style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:14,padding:14,marginBottom:10}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:6}}>
                <div>
                  <div style={{fontFamily:"Georgia,serif",fontSize:17,color:C.text}}>{w.word}</div>

              {w.videoUrl&&(
                <div>
                  <div style={{fontSize:11,color:C.green,fontWeight:600,marginBottom:4}}>📹 Your sentence</div>
                  <video key={w.videoUrl} src={w.videoUrl} controls style={{width:"100%",borderRadius:8,background:"#000",maxHeight:130}}/>

              )}

  const [bwLog, setBwLog] = useState(()=>ld("dos_bw_log_v1",[]));
  const [showBwModal, setShowBwModal] = useState(false);

  useEffect(()=>{ const k=tdk(); setUsage(prev=>{const u={...prev,[k]:(prev[k]||0)+1};sv("dos_usage_v7",u);return u;}); },[]);
  useEffect(()=>{ sv("dos_meals_v7",meals); },[meals]);
  useEffect(()=>{ sv("dos_attend_v7",attend); },[attend]);
  useEffect(()=>{ sv("dos_vocab_v7_"+tdk(),vocab); },[vocab]);
  useEffect(()=>{ sv("dos_learned_v7",learned); },[learned]);
  useEffect(()=>{ sv("dos_favorites_v1",favorites); },[favorites]);
  useEffect(()=>{ sv("dos_supps_v1",supps); },[supps]);
  useEffect(()=>{ sv("dos_supp_checked_v1",suppChecked); },[suppChecked]);
  useEffect(()=>{ sv("dos_bw_log_v1",bwLog); },[bwLog]);

  // Track scroll for hero parallax (only on home page)
  useEffect(()=>{
    if (page !== "home") return;
    const el = document.getElementById("root");
    const handler = () => setScrollY(window.scrollY || document.documentElement.scrollTop);
    window.addEventListener("scroll", handler, {passive:true});
    return () => window.removeEventListener("scroll", handler);
  }, [page]);
  useEffect(()=>{ if(page!=="home") setScrollY(0); }, [page]);

  if (!apiKey) return <ApiKeyScreen onSave={setApiKey}/>;

  return (
    <div>
      {showBwModal&&<WeightLogModal bwLog={bwLog} setBwLog={setBwLog} onClose={()=>setShowBwModal(false)}/>}
      {page==="home"        && <HomePage    meals={meals} usage={usage} supps={supps} suppChecked={suppChecked} setPage={setPage} scrollY={scrollY} bwLog={bwLog} setShowBwModal={setShowBwModal}/>}
      {page==="fitness"     && <FitnessPage meals={meals} setMeals={setMeals} attend={attend} setAttend={setAttend} apiKey={apiKey} favorites={favorites} setFavorites={setFavorites} bwLog={bwLog} setBwLog={setBwLog}/>}
      {page==="vocab"       && <VocabPage   vocab={vocab} setVocab={setVocab} learned={learned} setLearned={setLearned}/>}
      {page==="supplements" && <SupplementsPage supps={supps} setSupps={setSupps} checked={suppChecked} setChecked={setSuppChecked}/>}
      <Nav page={page} setPage={setPage}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
